<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HACO - SISTEMA SAE SAMU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .neon-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); border-color: #ef4444 !important; }
        .neon-green { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); border-color: #10b981 !important; }
        .step-active { background: #ef4444; color: white; transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const API_URL = "https://script.google.com/macros/s/AKfycbzaxizVCggOIIjdUVyEz7Yk-8YemrsG5HZ9thMdl_DDzok2T120mggXfkZYj5S4PoAT/exec"; 

        const VIATURAS = [
            { id: 'basica', label: 'Básica (USB)', color: 'blue', icon: 'truck' },
            { id: 'avancada', label: 'Avançada (USA)', color: 'rose', icon: 'zap' },
            { id: 'paje', label: 'PAJÉ (Tático)', color: 'emerald', icon: 'shield' },
            { id: 'missoes', label: 'Missões (EVAM)', color: 'amber', icon: 'plane' }
        ];

        // CHECKLIST BASEADO NO FORMULÁRIO SAMU CANOAS
        const CHECKLIST = [
            { id: 'dea', n: 'DEA / Monitor Cardioversor', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'vent', n: 'Ventilador Mecânico (Transporte)', cat: 'Equipamentos', types: ['avancada', 'missoes'] },
            { id: 'aspirador', n: 'Aspirador de Secreções Portal', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'oximetro', n: 'Oxímetro de Pulso / Glicosímetro', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'laringo', n: 'Laringoscópio (Lâminas 0 a 5)', cat: 'Vias Aéreas', types: ['avancada', 'missoes'] },
            { id: 'ambu', n: 'AMBU (BVM) Adulto/Infantil', cat: 'Vias Aéreas', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'tubos', n: 'Tubos Endotraqueais / Cânulas', cat: 'Vias Aéreas', types: ['avancada', 'missoes'] },
            { id: 'prancha', n: 'Prancha Rígida / Imobilizadores', cat: 'Trauma', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'colares', n: 'Colares Cervicais (P/M/G)', cat: 'Trauma', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'acesso', n: 'Kits de Acesso Venoso / Soros', cat: 'Insumos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'maleta', n: 'Maleta de Psicotrópicos/Meds', cat: 'Insumos', types: ['avancada', 'missoes'] }
        ];

        const CATEGORIES = ["Militar", "Equipamentos", "Vias Aéreas", "Trauma", "Insumos", "Finalizar"];

        function App() {
            const [view, setView] = useState('menu'); 
            const [vSel, setVSel] = useState(null);
            const [step, setStep] = useState(0);
            const [db, setDb] = useState([]);
            const [form, setForm] = useState({ placa: '', posto: '', guerra: '', items: {} });
            const [loading, setLoading] = useState(false);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [view, step, db]);

            // --- LÓGICA DE AUDITORIA ---
            const audit = useMemo(() => {
                if (!db.length) return { op: 0, shifts: {}, alerts: [], history: [] };
                const today = new Date().toLocaleDateString('pt-BR');
                const conforme = db.filter(d => d[5] === 'C').length;
                const nc = db.filter(d => d[5] === 'NC').map(d => ({ ts: d[0], v: d[1], p: d[2], r: d[3], i: d[4], o: d[6] })).reverse();
                
                const shifts = {};
                VIATURAS.forEach(v => {
                    const logs = db.filter(d => d[1] === v.label && d[0].includes(today));
                    const check = (s, e) => {
                        const l = logs.find(d => { 
                            const match = d[0].match(/(\d{2}):/);
                            const h = match ? parseInt(match[1]) : -1;
                            return h >= s && h < e;
                        });
                        return l ? { ok: true, u: l[3] } : { ok: false };
                    };
                    shifts[v.label] = { M: check(7, 13), T: check(13, 19), N: check(19, 24) || check(0, 7) };
                });
                return { op: Math.round((conforme / db.length) * 100), shifts, alerts: nc.slice(0, 10), history: [...db].reverse() };
            }, [db]);

            const startCheck = (v) => {
                const items = {};
                CHECKLIST.filter(i => i.types.includes(v.id)).forEach(i => items[i.id] = { status: 'C', obs: '' });
                setForm({ placa: '', posto: '', guerra: '', items });
                setVSel(v);
                setStep(0);
                setView('form');
            };

            const send = async () => {
                if(!form.placa || !form.posto || !form.guerra) return alert("Erro: Identificação incompleta.");
                setLoading(true);
                const payload = {
                    action: 'write', tipo: vSel.label, placa: form.placa, resp: `${form.posto} ${form.guerra}`,
                    items: Object.entries(form.items).map(([id, val]) => ({ nome: CHECKLIST.find(i => i.id === id).n, status: val.status, obs: val.obs }))
                };
                try {
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setView('sucesso');
                } catch (e) { alert("Erro de Rede."); }
                setLoading(false);
            };

            const sync = async () => {
                setLoading(true);
                try {
                    const r = await fetch(`${API_URL}?action=read&t=${Date.now()}`);
                    setDb(await r.json());
                    setView('admin');
                } catch (e) { alert("Falha na sincronização."); }
                setLoading(false);
            };

            // --- MOBILE VIEW: COLETOR ---
            if (view === 'menu') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 space-y-12 bg-slate-950">
                    <div className="text-center space-y-4">
                        <div className="bg-red-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto shadow-2xl mb-4 animate-pulse"><i data-lucide="cross" className="text-white w-10 h-10"></i></div>
                        <h1 className="text-5xl font-black italic uppercase text-white">HACO <span className="text-red-600">SAE</span></h1>
                        <p className="text-slate-500 font-bold uppercase tracking-[0.3em] text-[10px]">Gestão Técnica SAMU Canoas</p>
                    </div>
                    <div className="grid grid-cols-1 gap-4 w-full max-w-sm">
                        {VIATURAS.map(v => (
                            <button key={v.id} onClick={() => startCheck(v)} className="glass p-6 rounded-[2rem] flex items-center gap-6 active:scale-95 transition-all border-l-8 border-rose-600">
                                <div className="bg-slate-800 p-4 rounded-xl shadow-lg"><i data-lucide={v.icon} className="text-white w-6 h-6"></i></div>
                                <span className="font-black text-white uppercase text-sm tracking-widest">{v.label}</span>
                            </button>
                        ))}
                    </div>
                    <button onClick={sync} className="text-slate-600 font-black uppercase text-[10px] tracking-widest pt-10 border-t border-white/5 w-full max-w-xs italic transition-colors hover:text-red-500">Acesso Oficial Gestor (Desktop)</button>
                </div>
            );

            if (view === 'form') {
                const currentCat = CATEGORIES[step];
                const items = CHECKLIST.filter(i => i.types.includes(vSel.id) && i.cat === currentCat);

                return (
                    <div className="min-h-screen flex flex-col bg-slate-950 pb-40">
                        <header className="p-6 glass flex justify-between items-center sticky top-0 z-50 rounded-b-[2rem]">
                            <button onClick={() => setView('menu')} className="bg-white/10 p-2 rounded-xl text-slate-400"><i data-lucide="chevron-left"></i></button>
                            <div className="text-center"><h1 className="font-black uppercase text-xs tracking-tighter text-slate-400">{vSel.label}</h1><p className="font-bold text-sm italic">{currentCat}</p></div>
                            <span className="font-mono text-[10px] font-black bg-red-600 px-3 py-1 rounded-full">{step + 1}/{CATEGORIES.length}</span>
                        </header>

                        <main className="p-4 space-y-6 flex-1 overflow-y-auto animate-fade">
                            {currentCat === 'Militar' && (
                                <div className="space-y-6 glass p-8 rounded-[2.5rem] shadow-2xl">
                                    <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 ml-4">Viatura / Placa</label><input type="text" placeholder="ABC-1234" className="w-full p-6 bg-black/40 border border-white/10 rounded-2xl font-black text-center text-3xl uppercase text-white" value={form.placa} onChange={e => setForm({...form, placa: e.target.value.toUpperCase()})} /></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 ml-4">Posto</label><input type="text" placeholder="1T" className="w-full p-4 bg-black/40 border border-white/10 rounded-2xl font-bold text-center uppercase text-white" value={form.posto} onChange={e => setForm({...form, posto: e.target.value.toUpperCase()})} /></div>
                                        <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 ml-4">Guerra</label><input type="text" placeholder="NOME" className="w-full p-4 bg-black/40 border border-white/10 rounded-2xl font-bold text-center uppercase text-white" value={form.guerra} onChange={e => setForm({...form, guerra: e.target.value.toUpperCase()})} /></div>
                                    </div>
                                </div>
                            )}

                            {items.map(i => (
                                <div key={i.id} className="glass p-6 rounded-[2.5rem] space-y-6">
                                    <div className="flex justify-between items-start">
                                        <span className="font-black text-sm uppercase tracking-tight text-white leading-tight max-w-[55%]">{i.n}</span>
                                        <div className="flex bg-black/50 p-1 rounded-2xl border border-white/5 shadow-inner">
                                            <button onClick={() => setForm({...form, items: {...form.items, [i.id]: {status: 'C', obs: form.items[i.id].obs}}})} className={`px-6 py-3 rounded-xl font-black text-[10px] transition-all ${form.items[i.id].status === 'C' ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-600'}`}>C</button>
                                            <button onClick={() => setForm({...form, items: {...form.items, [i.id]: {status: 'NC', obs: form.items[i.id].obs}}})} className={`px-6 py-3 rounded-xl font-black text-[10px] transition-all ${form.items[i.id].status === 'NC' ? 'bg-red-600 text-white shadow-lg' : 'text-slate-600'}`}>NC</button>
                                        </div>
                                    </div>
                                    <input type="text" placeholder="Observação técnica SAE..." className={`w-full p-4 bg-black/20 rounded-2xl text-[11px] text-slate-300 border-none outline-none focus:ring-2 focus:ring-red-600/30 ${form.items[i.id].status === 'NC' ? 'bg-red-950/20 placeholder-red-900 font-bold italic' : ''}`} value={form.items[i.id].obs} onChange={e => setForm({...form, items: {...form.items, [i.id]: {...form.items[i.id], obs: e.target.value}}})} />
                                </div>
                            ))}

                            {currentCat === 'Finalizar' && (
                                <div className="text-center space-y-8 glass p-10 rounded-[3.5rem] animate-fade">
                                    <div className="bg-red-600 w-24 h-24 rounded-full flex items-center justify-center mx-auto shadow-2xl animate-pulse"><i data-lucide="send" className="text-white w-10 h-10"></i></div>
                                    <div className="space-y-2"><h3 className="font-black uppercase text-2xl tracking-tighter">Concluir Auditoria</h3><p className="text-slate-500 text-xs font-bold uppercase tracking-widest italic">Dados serão transmitidos ao HACO</p></div>
                                    <button onClick={send} disabled={loading} className="w-full bg-white text-black font-black py-7 rounded-[2rem] shadow-2xl active:scale-95 transition-all text-sm uppercase tracking-widest">
                                        {loading ? 'SINCRONIZANDO...' : 'EXECUTAR GRAVAÇÃO'}
                                    </button>
                                </div>
                            )}
                        </main>

                        <footer className="fixed bottom-0 left-0 right-0 p-6 glass border-t border-white/5 flex gap-4 bg-slate-950/95">
                            {step > 0 && <button onClick={() => setStep(step - 1)} className="flex-1 bg-white/5 p-6 rounded-3xl font-black uppercase text-xs text-slate-400">Voltar</button>}
                            {step < CATEGORIES.length - 1 && <button onClick={() => setStep(step + 1)} className="flex-[2] bg-red-600 p-6 rounded-3xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Próximo Passo</button>}
                        </footer>
                    </div>
                );
            }

            // --- DESKTOP VIEW: MONITOR TV 32" ---
            if (view === 'admin') return (
                <div className="min-h-screen flex bg-[#020617] animate-fade overflow-hidden">
                    <aside className="w-24 bg-slate-900 border-r border-white/5 flex flex-col items-center py-10 gap-8">
                        <div className="bg-red-600 p-4 rounded-3xl shadow-lg shadow-red-900/40 text-white"><i data-lucide="shield-check"></i></div>
                        <button onClick={sync} className="p-4 text-slate-500 hover:text-white transition-all"><i data-lucide="refresh-cw" className={loading ? 'animate-spin' : ''}></i></button>
                        <button onClick={() => setView('menu')} className="mt-auto p-4 text-slate-700 hover:text-red-500 transition-all"><i data-lucide="log-out"></i></button>
                    </aside>

                    <main className="flex-1 p-10 overflow-y-auto space-y-12 no-scrollbar">
                        <header className="flex justify-between items-end border-b border-white/5 pb-10">
                            <div><h1 className="text-8xl font-black tracking-tighter uppercase italic text-white leading-none">PRONTIDÃO <span className="text-red-600">SAE</span></h1><p className="text-slate-500 font-mono text-xs uppercase mt-6 tracking-[0.6em]">OPS CENTER - HOSPITAL DE AERONÁUTICA DE CANOAS</p></div>
                            <div className="glass p-12 rounded-[4rem] text-center min-w-[280px] border-t-8 border-emerald-500 shadow-[0_0_50px_rgba(16,185,129,0.1)]">
                                <span className="text-9xl font-black text-emerald-400 font-mono leading-none">{audit.op}%</span>
                                <p className="text-[10px] font-black text-slate-500 mt-6 tracking-widest uppercase italic">Conformidade Operacional</p>
                            </div>
                        </header>

                        <div className="grid grid-cols-4 gap-8">
                            {VIATURAS.map(v => (
                                <div key={v.id} className="glass p-10 rounded-[3rem] relative overflow-hidden border-b-8 border-white/5">
                                    <div className={`absolute top-0 left-0 w-full h-2 bg-${v.color === 'blue' ? 'blue-500' : v.color === 'rose' ? 'rose-500' : v.color === 'emerald' ? 'emerald-500' : 'amber-500'}`}></div>
                                    <h4 className="text-xs font-black text-white uppercase tracking-[0.4em] mb-12 border-b border-white/5 pb-6 italic">{v.label}</h4>
                                    <div className="space-y-10">
                                        {['MANHÃ', 'TARDE', 'NOITE'].map(s => {
                                            const log = audit.shifts[v.label][s[0]];
                                            return (
                                                <div key={s} className="flex justify-between items-start">
                                                    <div><span className="block text-[10px] font-black text-slate-600 uppercase mb-2 tracking-widest">{s}</span>{log?.ok && <span className="text-xs font-bold text-white uppercase italic underline decoration-red-600 tracking-tighter">{log.u}</span>}</div>
                                                    <span className={`px-5 py-2 rounded-xl text-[10px] font-black border ${log?.ok ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-red-500/10 text-red-500 border-red-500/20 animate-pulse'}`}>{log?.ok ? 'CHECK' : 'PENDENTE'}</span>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="glass p-12 rounded-[4rem] neon-red relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-red-600/5 blur-[100px] rounded-full"></div>
                            <h3 className="text-xs font-black uppercase text-red-500 tracking-[0.6em] mb-12 flex items-center gap-6 italic"><i data-lucide="alert-octagon" className="animate-pulse w-8 h-8"></i> FALHAS CRÍTICAS DETECTADAS (NC)</h3>
                            <div className="grid grid-cols-2 gap-8 relative z-10">
                                {audit.alerts.map((a, i) => (
                                    <div key={i} className="flex justify-between items-center p-8 bg-slate-950/50 rounded-[2.5rem] border border-white/5 hover:bg-red-950/20 transition-all group">
                                        <div className="flex items-center gap-8 italic uppercase">
                                            <div className="bg-red-600/20 text-red-500 p-6 rounded-3xl shadow-inner group-hover:bg-red-600 group-hover:text-white transition-all"><i data-lucide="activity"></i></div>
                                            <div><p className="text-xl font-black leading-none text-white">{a.i}</p><p className="text-xs text-red-400 mt-3 font-bold">{a.o || "Material Faltante / Inoperante"}</p></div>
                                        </div>
                                        <div className="text-right font-mono"><p className="text-sm font-black text-slate-400">{a.r}</p><p className="text-xs text-slate-700 mt-2 font-black">{a.p}</p></div>
                                    </div>
                                ))}
                                {audit.alerts.length === 0 && <div className="col-span-2 text-center py-20 opacity-20 font-black uppercase tracking-[1em] italic text-4xl">Frota 100% Operacional</div>}
                            </div>
                        </div>
                    </main>
                </div>
            );

            if (view === 'sucesso') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 bg-slate-950 text-center animate-fade">
                    <div className="w-32 h-32 bg-emerald-500/20 text-emerald-500 rounded-[3rem] flex items-center justify-center mb-10 animate-bounce border border-emerald-500/30"><i data-lucide="check-circle" className="w-16 h-16"></i></div>
                    <h1 className="text-6xl font-black italic text-white uppercase tracking-tighter leading-none mb-12">MISSÃO<br/>CUMPRIDA</h1>
                    <button onClick={() => { setSubmitted(false); setMode('selection'); window.location.reload(); }} className="w-full max-w-xs bg-white text-black font-black py-8 rounded-[2.5rem] shadow-2xl uppercase tracking-[0.2em] text-xs active:scale-95 transition-all">Nova Verificação</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
