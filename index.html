<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HACO - Gestão de Equipamentos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card-inner-shadow { box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzaxizVCggOIIjdUVyEz7Yk-8YemrsG5HZ9thMdl_DDzok2T120mggXfkZYj5S4PoAT/exec"; 

        const AMBULANCE_TYPES = [
            { id: 'basica', label: 'Básica', color: 'bg-blue-500', border: 'border-blue-200', text: 'text-blue-600', light: 'bg-blue-50' },
            { id: 'avancada', label: 'Avançada', color: 'bg-red-500', border: 'border-red-200', text: 'text-red-600', light: 'bg-red-50' },
            { id: 'paje', label: 'PAJÉ', color: 'bg-emerald-500', border: 'border-emerald-200', text: 'text-emerald-600', light: 'bg-emerald-50' },
            { id: 'missoes', label: 'Missões', color: 'bg-orange-500', border: 'border-orange-200', text: 'text-orange-600', light: 'bg-orange-50' }
        ];

        const CATEGORIES = [
            { id: 'info', label: 'Identificação', icon: 'user' },
            { id: 'Insumos', label: 'Insumos Médicos', icon: 'package' },
            { id: 'Equipamentos', label: 'Equipamentos APH', icon: 'stethoscope' },
            { id: 'revisar', label: 'Finalizar', icon: 'check-circle' }
        ];

        const MASTER_CHECKLIST = [
            { id: 'esparadrapo', label: 'Esparadrapo', cat: 'Insumos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'micropore', label: 'Micropore', cat: 'Insumos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'dea', label: 'DEA / Monitor Cardíaco', cat: 'Equipamentos', types: ['avancada', 'missoes'] },
            { id: 'oximetro', label: 'Oxímetro de Pulso', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'talas', label: 'Talas imobilização', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'fluxometro', label: 'Fluxômetro O2', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] }
        ];

        function App() {
            const [mode, setMode] = useState('selection');
            const [selectedType, setSelectedType] = useState(null);
            const [currentStep, setCurrentStep] = useState(0);
            const [loading, setLoading] = useState(false);
            const [submitted, setSubmitted] = useState(false);
            const [formData, setFormData] = useState({ placa: '', posto: '', nomeGuerra: '', items: {} });
            const [adminData, setAdminData] = useState([]);
            const lastNCSize = useRef(0);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [mode, currentStep, submitted, adminData]);

            // --- LÓGICA DE AUDITORIA ---
            const audit = useMemo(() => {
                if (!adminData.length) return { operacional: 0, alerts: [], shifts: {}, currentShift: '---' };
                const today = new Date().toLocaleDateString('pt-BR');
                const hour = new Date().getHours();
                
                let shiftName = 'NOITE';
                if (hour >= 7 && hour < 13) shiftName = 'MANHÃ';
                else if (hour >= 13 && hour < 19) shiftName = 'TARDE';

                const ncItems = adminData.filter(d => d[5] === 'NC').map(d => ({
                    data: d[0], tipo: d[1], placa: d[2], resp: d[3], item: d[4], obs: d[6]
                })).reverse();

                if (ncItems.length > lastNCSize.current && mode === 'admin') {
                    new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play().catch(()=>{});
                    lastNCSize.current = ncItems.length;
                }

                const shifts = {};
                AMBULANCE_TYPES.forEach(t => {
                    const logsToday = adminData.filter(d => d[1] === t.label && d[0].includes(today));
                    const getShiftData = (start, end) => {
                        const log = logsToday.find(d => {
                            const h = parseInt(d[0].match(/(\d{2}):/)[1]);
                            return h >= start && h < end;
                        });
                        return log ? { ok: true, resp: log[3] } : { ok: false };
                    };
                    shifts[t.label] = {
                        MANHÃ: getShiftData(7, 13), TARDE: getShiftData(13, 19),
                        NOITE: logsToday.find(d => {
                            const h = parseInt(d[0].match(/(\d{2}):/)[1]);
                            return h >= 19 || h < 7;
                        }) ? { ok: true, resp: logsToday.find(d => { const h = parseInt(d[0].match(/(\d{2}):/)[1]); return h >= 19 || h < 7; })[3] } : { ok: false }
                    };
                });

                return { operacional: Math.round((adminData.filter(d => d[5] === 'C').length / adminData.length) * 100), alerts: ncItems.slice(0, 6), shifts, currentShift: shiftName };
            }, [adminData, mode]);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${GOOGLE_SHEET_URL}?action=read&t=${Date.now()}`);
                    const data = await res.json();
                    setAdminData(data);
                    setMode('admin');
                } catch (e) { alert("Erro de sincronização."); }
                setLoading(false);
            };

            const resetApp = () => {
                setSubmitted(false); setSelectedType(null); setCurrentStep(0);
                setFormData({ placa: '', posto: '', nomeGuerra: '', items: {} });
                setMode('selection');
            };

            const handleTypeSelect = (type) => {
                setSelectedType(type);
                const items = {};
                MASTER_CHECKLIST.filter(i => i.types.includes(type.id)).forEach(i => { items[i.id] = { status: 'C', obs: '' }; });
                setFormData({ ...formData, items });
                setMode('user');
            };

            const handleSubmit = async () => {
                if (!formData.placa || !formData.posto || !formData.nomeGuerra) return alert("Preencha os dados de identificação.");
                setLoading(true);
                const payload = {
                    action: 'write', tipo: selectedType.label, placa: formData.placa,
                    responsavel: `${formData.posto} ${formData.nomeGuerra}`,
                    items: Object.entries(formData.items).map(([id, val]) => ({ nome: MASTER_CHECKLIST.find(i => i.id === id).label, status: val.status, obs: val.obs }))
                };
                try {
                    await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setSubmitted(true);
                } catch (e) { alert("Erro ao salvar."); }
                setLoading(false);
            };

            // --- DASHBOARD GESTÃO (LIGHT) ---
            if (mode === 'admin') {
                return (
                    <div className="min-h-screen flex flex-col lg:flex-row animate-fade-in">
                        <aside className="lg:w-64 bg-white border-r border-slate-200 p-6 space-y-8 shadow-sm">
                            <div className="flex items-center gap-3 border-b pb-6">
                                <div className="bg-red-500 p-2 rounded-xl text-white shadow-lg"><i data-lucide="activity"></i></div>
                                <div>
                                    <h2 className="font-black text-[10px] uppercase text-red-500 leading-none">Gestão de Saúde</h2>
                                    <p className="font-bold text-xs uppercase tracking-widest text-slate-800">HACO Ops</p>
                                </div>
                            </div>
                            <nav className="space-y-1">
                                <button className="w-full flex items-center gap-3 p-4 bg-red-50 text-red-600 rounded-2xl font-black text-[10px] uppercase tracking-widest"><i data-lucide="layout-dashboard" className="w-4 h-4"></i> Monitor</button>
                                <button onClick={fetchData} className="w-full flex items-center gap-3 p-4 text-slate-400 hover:bg-slate-50 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all"><i data-lucide="refresh-cw" className={loading ? 'animate-spin' : ''}></i> Sincronizar</button>
                            </nav>
                            <button onClick={resetApp} className="w-full p-4 text-slate-300 font-black text-[10px] uppercase tracking-widest hover:text-red-500 transition-colors">Voltar</button>
                        </aside>

                        <main className="flex-1 p-6 lg:p-10 space-y-8 overflow-y-auto">
                            <header className="flex justify-between items-end border-b pb-6">
                                <div>
                                    <h1 className="text-4xl font-black text-slate-900 tracking-tighter uppercase italic leading-none">Gestão de Equipamentos</h1>
                                    <p className="text-slate-400 font-bold text-[10px] uppercase tracking-[0.3em] mt-3 italic">Controle de Prontidão SAE - Turno: <span className="text-red-600">{audit.currentShift}</span></p>
                                </div>
                                <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 text-center min-w-[140px]">
                                    <span className="text-3xl font-black text-emerald-500">{audit.operacional}%</span>
                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mt-1 italic">Conformidade Global</p>
                                </div>
                            </header>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {AMBULANCE_TYPES.map(t => (
                                    <div key={t.id} className={`bg-white p-6 rounded-[2.5rem] shadow-sm border-t-4 ${t.border}`}>
                                        <h4 className={`text-[10px] font-black ${t.text} uppercase tracking-widest mb-6 border-b pb-2`}>{t.label}</h4>
                                        <div className="space-y-4">
                                            {['MANHÃ', 'TARDE', 'NOITE'].map(s => (
                                                <div key={s} className="flex justify-between items-center">
                                                    <div>
                                                        <span className="text-[9px] font-black text-slate-400 block">{s}</span>
                                                        {audit.shifts[t.label][s].ok && <span className="text-[10px] font-extrabold text-slate-700 uppercase italic leading-none">{audit.shifts[t.label][s].resp}</span>}
                                                    </div>
                                                    <span className={`px-3 py-1 rounded-lg text-[8px] font-black uppercase ${audit.shifts[t.label][s].ok ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-500 animate-pulse'}`}>
                                                        {audit.shifts[t.label][s].ok ? 'CONCLUÍDO' : 'PENDENTE'}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="bg-white rounded-[3rem] p-8 shadow-sm border border-slate-100">
                                <h3 className="text-[10px] font-black uppercase text-red-500 tracking-[0.3em] mb-8 flex items-center gap-2 italic"><i data-lucide="alert-circle" className="w-4 h-4"></i> Alertas de Equipamentos Críticos (NC)</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {audit.alerts.map((a, i) => (
                                        <div key={i} className="flex justify-between items-center p-5 bg-slate-50 rounded-3xl border border-slate-100 group hover:border-red-500 transition-all">
                                            <div className="flex items-center gap-4">
                                                <div className="bg-red-500 text-white p-3 rounded-2xl shadow-lg"><i data-lucide="stethoscope" className="w-4 h-4"></i></div>
                                                <div>
                                                    <p className="text-xs font-black uppercase italic text-slate-800">{a.item}</p>
                                                    <p className="text-[10px] font-bold text-red-500 mt-1">{a.obs || "Material Faltante / Danificado"}</p>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <span className="block text-[10px] font-black text-slate-900 uppercase leading-none italic">{a.resp}</span>
                                                <span className="text-[8px] font-bold text-slate-400 uppercase mt-1 leading-none">{a.placa}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            // --- FLUXO DE SELEÇÃO E CHECKLIST ---
            if (submitted) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-8 text-center bg-white animate-fade-in">
                        <div className="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center mb-6 text-emerald-600 shadow-inner"><i data-lucide="check-circle" className="w-10 h-10"></i></div>
                        <h1 className="text-3xl font-black mb-2 uppercase italic tracking-tighter">Dados Enviados!</h1>
                        <p className="text-slate-400 mb-10 font-bold text-[10px] uppercase tracking-widest">Auditoria de Equipamentos Concluída.</p>
                        <button onClick={resetApp} className="w-full max-w-xs bg-slate-900 text-white font-black py-6 rounded-3xl shadow-xl uppercase tracking-widest text-[10px] active:scale-95 transition-all">Nova Verificação</button>
                    </div>
                );
            }

            if (mode === 'selection') {
                return (
                    <div className="min-h-screen p-8 flex flex-col justify-center animate-fade-in bg-slate-50">
                        <div className="max-w-md mx-auto w-full space-y-12 text-center">
                            <div className="space-y-4">
                                <div className="bg-red-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto shadow-2xl text-white mb-6"><i data-lucide="cross" className="w-10 h-10"></i></div>
                                <h1 className="text-5xl font-black text-slate-900 tracking-tighter uppercase italic leading-none">HACO <span className="text-red-600 font-black">OPS</span></h1>
                                <p className="text-slate-400 font-bold uppercase text-[10px] tracking-[0.4em] italic leading-none">Gestão de Equipamentos de Saúde</p>
                            </div>
                            <div className="grid grid-cols-2 gap-6">
                                {AMBULANCE_TYPES.map(t => (
                                    <button key={t.id} onClick={() => handleTypeSelect(t)} className="bg-white p-8 rounded-[3.5rem] shadow-sm border border-slate-100 flex flex-col items-center gap-5 active:scale-95 transition-all hover:border-red-500 group">
                                        <div className={`${t.color} p-5 rounded-2xl text-white shadow-xl group-hover:scale-110 transition-transform`}><i data-lucide="truck"></i></div>
                                        <span className="font-black text-slate-800 uppercase text-[10px] tracking-widest">{t.label}</span>
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => setMode('login')} className="w-full py-6 text-slate-400 font-bold text-[10px] uppercase tracking-widest hover:text-red-600 transition-colors italic border-t pt-10">Painel de Gestão e Auditoria</button>
                        </div>
                    </div>
                );
            }

            if (mode === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100 animate-fade-in">
                        <div className="w-full max-w-sm bg-white p-12 rounded-[4rem] shadow-2xl space-y-8 text-center border border-slate-100">
                            <div className="bg-red-600 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-4 text-white shadow-xl shadow-red-200"><i data-lucide="lock"></i></div>
                            <h2 className="text-2xl font-black uppercase tracking-tighter text-slate-800 italic leading-none">Autenticação<br/>Gestor</h2>
                            <div className="space-y-4">
                                <input type="password" placeholder="SENHA DE ACESSO" className="w-full p-6 bg-slate-50 rounded-[2rem] outline-none font-black text-center text-sm border-2 border-transparent focus:border-red-500 transition-all" value={loginData.pass} onChange={e => setLoginData({...loginData, pass: e.target.value})} />
                            </div>
                            <button onClick={() => loginData.pass === 'sdenf2026' ? fetchData() : alert("Acesso negado.")} className="w-full bg-slate-900 text-white font-black py-6 rounded-[2.5rem] shadow-xl uppercase tracking-widest text-[11px] active:scale-95 transition-all italic">Entrar no Comando</button>
                            <button onClick={resetApp} className="text-slate-400 font-bold text-[10px] uppercase tracking-widest italic">Voltar</button>
                        </div>
                    </div>
                );
            }

            const items = MASTER_CHECKLIST.filter(i => i.types.includes(selectedType?.id) && i.cat === CATEGORIES[currentStep].id);

            return (
                <div className="min-h-screen pb-40 animate-fade-in">
                    <header className={`sticky top-0 z-50 ${selectedType.color} text-white p-7 shadow-xl flex justify-between items-center rounded-b-[3rem]`}>
                        <div className="flex items-center gap-4">
                            <button onClick={resetApp} className="bg-white/20 p-2.5 rounded-2xl"><i data-lucide="chevron-left"></i></button>
                            <div>
                                <h1 className="font-black text-2xl italic tracking-tighter leading-none uppercase">{selectedType.label}</h1>
                                <p className="text-[10px] font-black uppercase opacity-70 tracking-widest italic mt-1">HACO - Canoas/RS</p>
                            </div>
                        </div>
                        <div className="bg-black/20 px-4 py-2 rounded-2xl border border-white/10 text-xs font-black italic">{currentStep + 1} / {CATEGORIES.length}</div>
                    </header>

                    <nav className="flex overflow-x-auto no-scrollbar sticky top-[100px] z-40 px-6 py-4 bg-white/80 backdrop-blur-xl border-b border-slate-100">
                        {CATEGORIES.map((cat, idx) => (
                            <button key={cat.id} className={`flex-1 min-w-[100px] py-3 flex flex-col items-center gap-1 border-b-4 transition-all ${idx === currentStep ? 'border-red-600 text-red-600 bg-red-50/50 rounded-t-3xl' : 'border-transparent text-slate-300'}`}>
                                <i data-lucide={cat.icon} className="w-4 h-4"></i>
                                <span className="text-[9px] font-black uppercase tracking-tighter">{cat.label}</span>
                            </button>
                        ))}
                    </nav>

                    <main className="max-w-md mx-auto p-6 pt-10 space-y-6">
                        {CATEGORIES[currentStep].id === 'info' && (
                            <div className="bg-white p-10 rounded-[4rem] shadow-sm border border-slate-100 space-y-8 animate-fade-in card-inner-shadow">
                                <div className="text-center">
                                    <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tighter italic">Identificação Militar</h2>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mt-2 italic leading-none">Procedimento SAE Obrigatório</p>
                                </div>
                                <div className="space-y-4">
                                    <input type="text" placeholder="VIATURA / PLACA" className="w-full p-6 rounded-[2.5rem] bg-slate-50 border-2 border-transparent focus:border-red-500 outline-none font-black text-3xl text-center uppercase shadow-sm transition-all" value={formData.placa} onChange={e => setFormData({...formData, placa: e.target.value.toUpperCase()})} />
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="text" placeholder="POSTO (Ex: 1T)" className="w-full p-5 rounded-[2rem] bg-slate-50 border-2 border-transparent focus:border-red-500 outline-none font-bold text-center uppercase text-sm shadow-sm" value={formData.posto} onChange={e => setFormData({...formData, posto: e.target.value.toUpperCase()})} />
                                        <input type="text" placeholder="NOME DE GUERRA" className="w-full p-5 rounded-[2rem] bg-slate-50 border-2 border-transparent focus:border-red-500 outline-none font-bold text-center uppercase text-sm shadow-sm" value={formData.nomeGuerra} onChange={e => setFormData({...formData, nomeGuerra: e.target.value.toUpperCase()})} />
                                    </div>
                                </div>
                            </div>
                        )}

                        {items.map(item => (
                            <div key={item.id} className="bg-white p-8 rounded-[3.5rem] shadow-sm border border-slate-100 animate-fade-in group">
                                <div className="flex justify-between items-center mb-6">
                                    <span className="font-black text-slate-800 text-lg uppercase italic leading-tight pr-4">{item.label}</span>
                                    <div className="flex bg-slate-100 p-1.5 rounded-2xl shrink-0 shadow-inner">
                                        <button onClick={() => setFormData({...formData, items: {...formData.items, [item.id]: {...formData.items[item.id], status: 'C'}}})} className={`px-6 py-3 rounded-xl text-[11px] font-black transition-all ${formData.items[item.id].status === 'C' ? 'bg-emerald-500 text-white shadow-xl scale-110' : 'text-slate-400'}`}>C</button>
                                        <button onClick={() => setFormData({...formData, items: {...formData.items, [item.id]: {...formData.items[item.id], status: 'NC'}}})} className={`px-6 py-3 rounded-xl text-[11px] font-black transition-all ${formData.items[item.id].status === 'NC' ? 'bg-red-500 text-white shadow-xl scale-110' : 'text-slate-400'}`}>NC</button>
                                    </div>
                                </div>
                                <input type="text" placeholder="Adicionar observação técnica..." className={`w-full p-5 text-xs rounded-[1.5rem] bg-slate-50 outline-none focus:ring-4 focus:ring-red-500/5 transition-all ${formData.items[item.id].status === 'NC' ? 'bg-red-50 text-red-500 font-bold italic' : 'text-slate-600'}`} value={formData.items[item.id].obs} onChange={e => setFormData({...formData, items: {...formData.items, [item.id]: {...formData.items[item.id], obs: e.target.value}}})} />
                            </div>
                        ))}

                        {CATEGORIES[currentStep].id === 'revisar' && (
                            <div className="bg-red-500 text-white p-12 rounded-[4.5rem] text-center shadow-2xl shadow-red-200 space-y-10 animate-fade-in border-t-8 border-red-600">
                                <div className="bg-white/10 w-24 h-24 rounded-full flex items-center justify-center mx-auto border border-white/20"><i data-lucide="send" className="w-10 h-10"></i></div>
                                <h2 className="text-4xl font-black italic uppercase leading-none tracking-tighter">Concluir<br/>Auditoria</h2>
                                <button onClick={handleSubmit} disabled={loading} className="w-full bg-slate-900 text-white font-black py-8 rounded-[2.5rem] shadow-2xl uppercase tracking-[0.3em] text-[11px] active:scale-95 transition-all italic">
                                    {loading ? 'SINCRONIZANDO...' : 'EXECUTAR GRAVAÇÃO'}
                                </button>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 p-8 bg-white/80 backdrop-blur-2xl border-t border-slate-100 flex gap-5 z-50 rounded-t-[4rem] shadow-[0_-20px_50px_rgba(0,0,0,0.05)]">
                        <div className="max-w-md mx-auto w-full flex gap-5">
                            {currentStep > 0 && <button onClick={() => setCurrentStep(s => s - 1)} className="flex-1 bg-white border-4 border-slate-50 text-slate-400 font-black py-6 rounded-[2.5rem] uppercase text-[10px] tracking-widest italic transition-all">Anterior</button>}
                            {currentStep < CATEGORIES.length - 1 && <button onClick={() => setCurrentStep(s => s + 1)} className="flex-[2] bg-slate-900 text-white font-black py-6 rounded-[2.5rem] shadow-2xl uppercase text-[10px] tracking-widest italic active:scale-95 border border-slate-50">Próximo</button>}
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
