<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HACO - Gestão de Prontidão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const GOOGLE_SHEET_URL = "SUA_URL_AQUI"; // Mantenha sua URL do Apps Script

        const AMBULANCE_TYPES = [
            { id: 'basica', label: 'Básica', icon: 'truck', color: 'bg-blue-600' },
            { id: 'avancada', label: 'Avançada', icon: 'zap', color: 'bg-red-600' },
            { id: 'paje', label: 'PAJÉ', icon: 'shield', color: 'bg-green-700' },
            { id: 'missoes', label: 'Missões', icon: 'plane', color: 'bg-slate-800' }
        ];

        const CATEGORIES = [
            { id: 'info', label: 'Início', icon: 'user' },
            { id: 'Insumos', label: 'Insumos', icon: 'package' },
            { id: 'Equipamentos', label: 'Equipamentos', icon: 'stethoscope' },
            { id: 'revisar', label: 'Finalizar', icon: 'check-circle' }
        ];

        // Base de dados de itens por tipo (Exemplos)
        const MASTER_CHECKLIST = [
            { id: 'esparadrapo', label: 'Esparadrapo', cat: 'Insumos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'desfibrilador', label: 'DEA / Monitor', cat: 'Equipamentos', types: ['avancada', 'missoes'] },
            { id: 'ventilador', label: 'Ventilador Mecânico', cat: 'Equipamentos', types: ['avancada', 'missoes'] },
            { id: 'oximetro', label: 'Oxímetro de Pulso', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje'] },
            { id: 'kit_parto', label: 'Kit Parto', cat: 'Insumos', types: ['basica', 'avancada'] },
            { id: 'radio_vhf', label: 'Rádio Tático VHF', cat: 'Equipamentos', types: ['paje', 'missoes'] },
            { id: 'manta_aluminio', label: 'Manta Técnica', cat: 'Insumos', types: ['paje', 'missoes'] },
        ];

        function App() {
            const [mode, setMode] = useState('selection'); // selection, user, admin, login
            const [selectedType, setSelectedType] = useState(null);
            const [currentStep, setCurrentStep] = useState(0);
            const [loading, setLoading] = useState(false);
            const [submitted, setSubmitted] = useState(false);
            const [formData, setFormData] = useState({ placa: '', responsavel: '', items: {} });
            const [adminData, setAdminData] = useState([]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [mode, currentStep]);

            const filteredItems = useMemo(() => {
                if (!selectedType) return [];
                return MASTER_CHECKLIST.filter(item => item.types.includes(selectedType.id));
            }, [selectedType]);

            const handleTypeSelect = (type) => {
                setSelectedType(type);
                // Inicia o estado dos itens para o tipo selecionado
                const initialItems = {};
                MASTER_CHECKLIST.filter(i => i.types.includes(type.id)).forEach(i => {
                    initialItems[i.id] = { status: 'C', obs: '' };
                });
                setFormData(prev => ({ ...prev, items: initialItems }));
                setMode('user');
            };

            const handleSubmit = async () => {
                setLoading(true);
                const payload = {
                    action: 'write',
                    tipo: selectedType.label,
                    placa: formData.placa,
                    responsavel: formData.responsavel,
                    items: Object.entries(formData.items).map(([id, val]) => ({
                        nome: MASTER_CHECKLIST.find(i => i.id === id).label,
                        status: val.status,
                        obs: val.obs
                    }))
                };
                try {
                    await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setSubmitted(true);
                } catch (e) { alert("Erro ao salvar dados."); }
                setLoading(false);
            };

            // TELA DE SELEÇÃO INICIAL
            if (mode === 'selection') {
                return (
                    <div className="min-h-screen p-6 flex flex-col justify-center animate-fade-in bg-slate-100">
                        <div className="max-w-md mx-auto w-full space-y-8">
                            <div className="text-center space-y-2">
                                <div className="bg-red-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto shadow-lg mb-4">
                                    <i data-lucide="cross" className="text-white w-8 h-8"></i>
                                </div>
                                <h1 className="text-3xl font-extrabold tracking-tighter text-slate-800">SISTEMA HACO</h1>
                                <p className="text-slate-500 font-semibold uppercase text-[10px] tracking-[0.2em]">Selecione o tipo de Viatura</p>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                {AMBULANCE_TYPES.map(type => (
                                    <button key={type.id} onClick={() => handleTypeSelect(type)} className="bg-white p-6 rounded-[2.5rem] card-shadow flex flex-col items-center gap-4 active:scale-95 transition-all border-2 border-transparent hover:border-red-500 group">
                                        <div className={`${type.color} p-4 rounded-2xl text-white shadow-lg`}>
                                            <i data-lucide={type.icon} className="w-6 h-6"></i>
                                        </div>
                                        <span className="font-extrabold text-slate-700 uppercase text-xs tracking-widest">{type.label}</span>
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => setMode('login')} className="w-full py-4 text-slate-400 font-bold text-[10px] uppercase tracking-widest">Acesso Administrativo</button>
                        </div>
                    </div>
                );
            }

            // DASHBOARD (DESKTOP REFINADO)
            if (mode === 'admin') {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col lg:flex-row">
                        {/* Sidebar Desktop */}
                        <aside className="lg:w-72 bg-slate-900 p-8 text-white flex flex-col justify-between">
                            <div className="space-y-8">
                                <div className="flex items-center gap-3">
                                    <div className="bg-red-600 p-2 rounded-lg"><i data-lucide="activity" className="w-5 h-5"></i></div>
                                    <h2 className="font-extrabold tracking-tighter text-xl">HACO Ops</h2>
                                </div>
                                <nav className="space-y-4">
                                    <button className="flex items-center gap-3 text-red-500 font-bold text-sm"><i data-lucide="layout-dashboard" className="w-4 h-4"></i> Dashboard</button>
                                    <button className="flex items-center gap-3 text-slate-400 font-bold text-sm hover:text-white transition-colors"><i data-lucide="history" className="w-4 h-4"></i> Histórico</button>
                                </nav>
                            </div>
                            <button onClick={() => setMode('selection')} className="bg-slate-800 p-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest">Sair do Painel</button>
                        </aside>

                        {/* Main Content */}
                        <main className="flex-1 p-4 lg:p-12 overflow-y-auto">
                            <header className="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                <div>
                                    <h1 className="text-3xl font-extrabold tracking-tight text-slate-800">Auditoria de Prontidão</h1>
                                    <p className="text-slate-400 text-sm font-medium">Relatório em tempo real das unidades.</p>
                                </div>
                                <div className="flex gap-4">
                                    <div className="bg-white px-6 py-4 rounded-3xl shadow-sm border border-slate-200">
                                        <span className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Status Frota</span>
                                        <span className="text-green-600 font-extrabold text-xl uppercase">94% Operacional</span>
                                    </div>
                                </div>
                            </header>

                            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                                {/* Exemplo de Card de Auditoria */}
                                {[1, 2, 3].map(i => (
                                    <div key={i} className="bg-white rounded-[2.5rem] p-8 card-shadow border border-slate-100 animate-fade-in">
                                        <div className="flex justify-between items-start mb-6">
                                            <span className="bg-red-50 text-red-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-tighter">Viatura Avançada</span>
                                            <span className="text-slate-300 font-bold text-[10px]">Hoje, 08:45</span>
                                        </div>
                                        <h3 className="text-2xl font-extrabold text-slate-800 mb-1 leading-none tracking-tighter uppercase">FAB-2304</h3>
                                        <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-6">Resp: Ten Cimirro</p>
                                        
                                        <div className="space-y-3">
                                            <div className="flex items-center gap-3 text-green-600 font-bold text-xs bg-green-50 p-3 rounded-2xl">
                                                <i data-lucide="check-circle" className="w-4 h-4"></i> Insumos OK
                                            </div>
                                            <div className="flex items-center gap-3 text-amber-600 font-bold text-xs bg-amber-50 p-3 rounded-2xl">
                                                <i data-lucide="alert-triangle" className="w-4 h-4"></i> DEA: Bateria 15% (Atenção)
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>
                );
            }

            // FORMULÁRIO DE CHECKLIST (MOBILE FIRST)
            const currentCategory = CATEGORIES[currentStep].id;
            const itemsToDisplay = filteredItems.filter(i => i.cat === currentCategory);

            return (
                <div className="min-h-screen pb-32 animate-fade-in bg-white">
                    <header className={`sticky top-0 z-50 ${selectedType?.color || 'bg-red-600'} text-white p-5 shadow-lg flex justify-between items-center`}>
                        <div className="flex items-center gap-3">
                            <button onClick={() => setMode('selection')} className="bg-white/20 p-2 rounded-xl">
                                <i data-lucide="chevron-left" className="w-5 h-5"></i>
                            </button>
                            <div>
                                <h1 className="font-extrabold text-lg italic tracking-tighter leading-none">{selectedType?.label}</h1>
                                <p className="text-[8px] font-black uppercase opacity-70 tracking-widest">HACO - Canoas/RS</p>
                            </div>
                        </div>
                        <div className="bg-black/20 px-3 py-1.5 rounded-xl border border-white/10">
                            <span className="text-[10px] font-black">{currentStep + 1} / {CATEGORIES.length}</span>
                        </div>
                    </header>

                    <nav className="bg-white border-b flex overflow-x-auto no-scrollbar sticky top-[72px] z-40">
                        {CATEGORIES.map((cat, idx) => (
                            <button key={cat.id} className={`flex-1 min-w-[80px] py-4 flex flex-col items-center gap-1 border-b-4 transition-all ${idx === currentStep ? 'border-red-600 text-red-600 bg-red-50/30' : 'border-transparent text-slate-300'}`}>
                                <i data-lucide={cat.icon} className="w-4 h-4"></i>
                                <span className="text-[8px] font-black uppercase tracking-tighter">{cat.label}</span>
                            </button>
                        ))}
                    </nav>

                    <main className="max-w-md mx-auto p-5 mt-4 space-y-4">
                        {currentCategory === 'info' && (
                            <div className="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-200 space-y-6">
                                <input type="text" placeholder="PLACA / VIATURA" className="w-full p-5 rounded-2xl bg-white border-2 border-transparent focus:border-red-500 outline-none font-black text-xl text-center uppercase shadow-sm" value={formData.placa} onChange={e => setFormData({...formData, placa: e.target.value.toUpperCase()})} />
                                <input type="text" placeholder="NOME DO RESPONSÁVEL" className="w-full p-5 rounded-2xl bg-white border-2 border-transparent focus:border-red-500 outline-none font-bold text-center uppercase shadow-sm" value={formData.responsavel} onChange={e => setFormData({...formData, responsavel: e.target.value.toUpperCase()})} />
                            </div>
                        )}

                        {itemsToDisplay.map(item => (
                            <div key={item.id} className="bg-white p-6 rounded-[2.5rem] card-shadow border border-slate-100 animate-fade-in">
                                <div className="flex justify-between items-center mb-5">
                                    <span className="font-bold text-slate-800 tracking-tight pr-4">{item.label}</span>
                                    <div className="flex bg-slate-100 p-1 rounded-2xl shrink-0">
                                        <button onClick={() => setFormData({...formData, items: {...formData.items, [item.id]: {...formData.items[item.id], status: 'C'}}})} className={`px-5 py-2.5 rounded-xl text-xs font-black transition-all ${formData.items[item.id].status === 'C' ? 'bg-green-500 text-white shadow-md' : 'text-slate-400'}`}>C</button>
                                        <button onClick={() => setFormData({...formData, items: {...formData.items, [item.id]: {...formData.items[item.id], status: 'NC'}}})} className={`px-5 py-2.5 rounded-xl text-xs font-black transition-all ${formData.items[item.id].status === 'NC' ? 'bg-red-500 text-white shadow-md' : 'text-slate-400'}`}>NC</button>
                                    </div>
                                </div>
                                <input type="text" placeholder="Observação..." className="w-full p-3.5 text-xs rounded-xl bg-slate-50 border-none outline-none focus:ring-1 focus:ring-red-200" value={formData.items[item.id].obs} onChange={e => setFormData({...formData, items: {...formData.items, [item.id]: {...formData.items[item.id], obs: e.target.value}}})} />
                            </div>
                        ))}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 p-5 glass border-t border-slate-100 flex gap-4 shadow-2xl">
                        <div className="max-w-md mx-auto w-full flex gap-3">
                            <button onClick={() => setCurrentStep(s => Math.max(0, s-1))} className="flex-1 bg-white border border-slate-200 text-slate-500 font-black py-5 rounded-3xl uppercase text-[10px] tracking-widest active:bg-slate-50">Voltar</button>
                            {currentStep < CATEGORIES.length - 1 ? (
                                <button onClick={() => setCurrentStep(s => s+1)} className="flex-[2] bg-red-600 text-white font-black py-5 rounded-3xl shadow-xl shadow-red-200 uppercase text-[10px] tracking-widest active:scale-95">Próximo</button>
                            ) : (
                                <button onClick={handleSubmit} disabled={loading} className="flex-[2] bg-slate-900 text-white font-black py-5 rounded-3xl shadow-xl uppercase text-[10px] tracking-widest active:scale-95">
                                    {loading ? 'GRAVANDO...' : 'FINALIZAR'}
                                </button>
                            )}
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
