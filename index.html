<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HACO - OPS CENTER SAE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ⚠️ COLE SUA URL AQUI ⚠️
        const API_URL = "https://script.google.com/macros/s/AKfycbzaxizVCggOIIjdUVyEz7Yk-8YemrsG5HZ9thMdl_DDzok2T120mggXfkZYj5S4PoAT/exec";

        const VIATURAS = [
            { id: 'basica', label: 'Básica (USB)', bg: 'bg-blue-600', border: 'border-blue-500' },
            { id: 'avancada', label: 'Avançada (USA)', bg: 'bg-rose-600', border: 'border-rose-500' },
            { id: 'paje', label: 'PAJÉ (Tático)', bg: 'bg-emerald-600', border: 'border-emerald-500' }
        ];

        const CATEGORIES = ["Administrativo", "Vias Aéreas", "Mochila Vermelha", "Diversos & Trauma", "Armários/Balcão"];

        // CONSOLIDAÇÃO DAS 11 PÁGINAS DO FORMULÁRIO
        const CHECKLIST = [
            // PASSO 0: ADMINISTRATIVO
            { id: 'smart', n: 'Smartphone e Carregador', cat: 0, opts: ['OK', 'FA'] },
            { id: 'carimbo', n: 'Carimbo da Viatura', cat: 0, opts: ['OK', 'FA'] },
            
            // PASSO 1: VIAS AÉREAS
            { id: 'bolsa_va', n: 'Bolsa de Via Aérea', cat: 1, opts: ['OK', 'FA', 'N/A'] },
            { id: 'bvm', n: 'AMBU Adulto/Ped/Neo', cat: 1, opts: ['OK', 'FA'] },
            { id: 'guedel', n: 'Cânulas de Guedel', cat: 1, opts: ['COMPLETAS', 'FALTA'] },
            { id: 'insumos_va', n: 'Óculos, Seringa 20ml, Extensor O2', cat: 1, opts: ['OK', 'FA'] },

            // PASSO 2: MOCHILA VERMELHA
            { id: 'sinais', n: 'Esteto, Esfigmos (Ad/Ped/Obeso), Termômetro', cat: 2, opts: ['OK', 'FA'] },
            { id: 'hgt', n: 'Aparelho HGT + 10 Fitas/Lancetas', cat: 2, opts: ['OK', 'FA'] },
            { id: 'bolso_b', n: 'Kit Nebulização, Extensor O2, Sondas Asp.', cat: 2, opts: ['OK', 'FA'] },
            { id: 'ponta1', n: 'Naso Longa, Manta Térmica', cat: 2, opts: ['OK', 'FA'] },
            { id: 'ponta2', n: 'Descartex Frasco, Sacos de Lixo', cat: 2, opts: ['OK', 'FA'] },
            { id: 'interno', n: 'Ataduras, N95, Gaze, Torniquete', cat: 2, opts: ['OK', 'FA'] },
            { id: 'meds', n: 'Medicação Geral', cat: 2, opts: ['COMPLETA', 'INCOMPLETA'] },
            { id: 'control', n: 'Medicação Controlada', cat: 2, opts: ['C/ LACRE', 'S/ LACRE', 'FA'] },
            { id: 'dea', n: 'DEA (Pás Ad/Ped, Pilhas)', cat: 2, opts: ['OK', 'TROCA NECESSÁRIA', 'FA'] },

            // PASSO 3: DIVERSOS E TRAUMA
            { id: 'o2_g', n: 'O2 Cilindro Grande (Torpedo 1 e 2)', cat: 3, opts: ['LACRADO', 'MC>20', 'TROCA', 'FA'] },
            { id: 'o2_p', n: 'O2 Portátil (Torpedo 1 e 2)', cat: 3, opts: ['LACRADO', 'MC>40', 'TROCA', 'FA'] },
            { id: 'imob', n: 'Maca Rígida, Coxins, Cinto Polvo', cat: 3, opts: ['OK', 'TROCA', 'FA'] },
            { id: 'ked', n: 'KED e Talas (P/M/G)', cat: 3, opts: ['OK', 'FA'] },
            { id: 'colchao', n: 'Colchão Retrátil / Reserva', cat: 3, opts: ['OK', 'EM USO', 'FA'] },
            { id: 'cones', n: 'Cones de Sinalização', cat: 3, opts: ['COMPLETOS', 'FA'] },

            // PASSO 4: PAREDE E ARMÁRIOS
            { id: 'parede', n: 'Fluxômetros, Máscaras Hudson, Frasco Asp.', cat: 4, opts: ['OK', 'FA'] },
            { id: 'colares', n: 'Colares Cervicais (Inf ao GG)', cat: 4, opts: ['COMPLETOS', 'FALTA'] },
            { id: 'gavetas', n: 'Chave O2, Carregador Oxímetro, Lanterna', cat: 4, opts: ['OK', 'FA'] },
            { id: 'armario2', n: 'Compressas, Soros (Fis/Ringer/Glic), Almotolias', cat: 4, opts: ['OK', 'FA'] }
        ];

        function App() {
            const [view, setView] = useState('menu'); 
            const [tab, setTab] = useState('monitor');
            const [vSel, setVSel] = useState(null);
            const [step, setStep] = useState(0);
            const [db, setDb] = useState([]);
            const [loading, setLoading] = useState(false);
            const [form, setForm] = useState({ placa: '', posto: '', guerra: '', obs: '', items: {} });

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [view, step, db, tab]);

            // --- LÓGICA DO DASHBOARD DA TV ---
            const audit = useMemo(() => {
                if (!db.length) return { op: 0, shifts: {}, alerts: [], history: [] };
                
                const today = new Date().toLocaleDateString('pt-BR');
                const total = db.filter(d => d[4] !== 'INFO').length;
                const oks = db.filter(d => ['OK', 'COMPLETAS', 'COMPLETA', 'C/ LACRE', 'LACRADO', 'MC>20', 'MC>40'].includes(d[5])).length;
                
                // Filtra o que deu problema
                const falhas = ['FA', 'FALTA', 'INCOMPLETA', 'S/ LACRE', 'TROCA NECESSÁRIA', 'TROCA'];
                const nc = db.filter(d => falhas.includes(d[5])).map(d => ({ ts: d[0], v: d[1], p: d[2], r: d[3], i: d[4], o: d[6] || d[5] })).reverse();
                
                // Agrupa histórico por viatura/horário
                const historyMap = db.reduce((acc, d) => {
                    if(d[4] === 'INFO') return acc;
                    const k = `${d[0]}_${d[2]}`;
                    if (!acc[k]) acc[k] = { ts: d[0], v: d[1], p: d[2], r: d[3], errs: 0 };
                    if (falhas.includes(d[5])) acc[k].errs++;
                    return acc;
                }, {});

                const shifts = {};
                VIATURAS.forEach(v => {
                    const logs = db.filter(d => d[1] === v.label && d[0].includes(today));
                    const check = (s, e) => {
                        const l = logs.find(d => { 
                            const match = d[0].match(/(\d{2}):/);
                            if(!match) return false;
                            const h = parseInt(match[1]);
                            return h >= s && h < e;
                        });
                        return l ? { ok: true, u: l[3] } : { ok: false };
                    };
                    shifts[v.label] = { M: check(7, 13), T: check(13, 19), N: check(19, 24) || check(0, 7) };
                });

                return { 
                    op: total > 0 ? Math.round((oks / total) * 100) : 0, 
                    shifts, 
                    alerts: nc.slice(0, 10), 
                    history: Object.values(historyMap).reverse() 
                };
            }, [db]);

            // --- AÇÕES DO APLICATIVO ---
            const start = (v) => {
                const items = {};
                CHECKLIST.forEach(i => items[i.id] = { status: i.opts[0], obs: '' });
                setForm({ placa: '', posto: '', guerra: '', obs: '', items });
                setVSel(v);
                setStep(0);
                setView('form');
            };

            const send = async () => {
                if(!form.placa || !form.posto || !form.guerra) return alert("ERRO: Identificação Militar é obrigatória.");
                setLoading(true);
                const payload = {
                    action: 'write', tipo: vSel.label, placa: form.placa, resp: `${form.posto} ${form.guerra}`, obsGerais: form.obs,
                    items: Object.entries(form.items).map(([id, val]) => ({ nome: CHECKLIST.find(i => i.id === id).n, status: val.status, obs: val.obs }))
                };
                try {
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setView('sucesso');
                } catch (e) { alert("Erro de Conexão com o Servidor HACO."); }
                setLoading(false);
            };

            const sync = async () => {
                setLoading(true);
                try {
                    const r = await fetch(`${API_URL}?action=read&t=${Date.now()}`);
                    setDb(await r.json());
                    setView('admin');
                } catch (e) { alert("Falha ao puxar os dados."); }
                setLoading(false);
            };

            // --- VIEW: MENU PRINCIPAL ---
            if (view === 'menu') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 space-y-12 animate-fade">
                    <div className="text-center space-y-4">
                        <div className="bg-red-600 w-24 h-24 rounded-[2rem] flex items-center justify-center mx-auto shadow-[0_0_40px_rgba(220,38,38,0.4)]"><i data-lucide="cross" className="text-white w-10 h-10"></i></div>
                        <h1 className="text-6xl font-black italic uppercase tracking-tighter">HACO <span className="text-red-600">SAE</span></h1>
                        <p className="text-slate-500 font-bold uppercase tracking-[0.4em] text-xs">Auditoria SAMU Canoas</p>
                    </div>
                    <div className="grid grid-cols-1 gap-6 w-full max-w-sm">
                        {VIATURAS.map(v => (
                            <button key={v.id} onClick={() => start(v)} className={`glass p-8 rounded-3xl flex items-center justify-between active:scale-95 transition-all border-l-8 ${v.border}`}>
                                <span className="font-black text-white uppercase text-sm tracking-widest">{v.label}</span>
                                <div className={`${v.bg} p-3 rounded-xl`}><i data-lucide="truck" className="text-white"></i></div>
                            </button>
                        ))}
                    </div>
                    <button onClick={sync} className="text-slate-600 font-black uppercase text-[10px] tracking-widest pt-10 border-t border-white/10 w-full max-w-xs transition-colors hover:text-red-500">Ops Center (TV/Desktop)</button>
                </div>
            );

            // --- VIEW: COLETOR MOBILE (AS 11 PÁGINAS) ---
            if (view === 'form') {
                const isFinal = step === CATEGORIES.length;
                const items = CHECKLIST.filter(i => i.cat === step);

                return (
                    <div className="min-h-screen flex flex-col bg-slate-950 pb-32 animate-fade">
                        <header className={`p-6 ${vSel.bg} flex justify-between items-center sticky top-0 z-50 rounded-b-3xl shadow-2xl`}>
                            <button onClick={() => setView('menu')} className="bg-black/20 p-2 rounded-xl text-white"><i data-lucide="chevron-left"></i></button>
                            <div className="text-center text-white"><h1 className="font-black uppercase text-sm tracking-tighter">{vSel.label}</h1></div>
                            <span className="font-mono text-[10px] font-black bg-black/30 px-3 py-1 rounded-full text-white">{step + 1}/{CATEGORIES.length + 1}</span>
                        </header>

                        <main className="p-4 space-y-6 flex-1 overflow-y-auto no-scrollbar">
                            {!isFinal && <h2 className="text-2xl font-black uppercase text-red-500 italic px-2 mb-6">{CATEGORIES[step]}</h2>}

                            {step === 0 && (
                                <div className="space-y-6 glass p-8 rounded-[2rem] border border-white/10">
                                    <h3 className="font-black text-white text-sm uppercase mb-4">Identificação Profissional</h3>
                                    <input type="text" placeholder="PLACA VIATURA" className="w-full p-5 bg-black/50 border border-white/10 rounded-2xl font-black text-center text-2xl uppercase text-white" value={form.placa} onChange={e => setForm({...form, placa: e.target.value.toUpperCase()})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="text" placeholder="POSTO (1T)" className="w-full p-4 bg-black/50 border border-white/10 rounded-2xl font-bold text-center uppercase text-white text-sm" value={form.posto} onChange={e => setForm({...form, posto: e.target.value.toUpperCase()})} />
                                        <input type="text" placeholder="GUERRA" className="w-full p-4 bg-black/50 border border-white/10 rounded-2xl font-bold text-center uppercase text-white text-sm" value={form.guerra} onChange={e => setForm({...form, guerra: e.target.value.toUpperCase()})} />
                                    </div>
                                </div>
                            )}

                            {!isFinal && items.map(i => (
                                <div key={i.id} className="glass p-6 rounded-[2rem] space-y-5 border border-white/5">
                                    <span className="font-black text-sm uppercase tracking-tight text-white block">{i.n}</span>
                                    <div className="flex flex-wrap gap-2">
                                        {i.opts.map(opt => (
                                            <button key={opt} onClick={() => setForm({...form, items: {...form.items, [i.id]: { ...form.items[i.id], status: opt }}})} 
                                                className={`px-4 py-3 rounded-xl font-black text-[10px] flex-1 transition-all ${form.items[i.id].status === opt ? (opt === 'FA' || opt === 'FALTA' || opt === 'TROCA' || opt.includes('INCOMPLETA') || opt.includes('S/ LACRE') ? 'bg-red-600 text-white shadow-lg scale-105' : 'bg-emerald-600 text-white shadow-lg scale-105') : 'bg-black/40 text-slate-400'}`}>
                                                {opt}
                                            </button>
                                        ))}
                                    </div>
                                    <input type="text" placeholder="Núm Lacre / Reposição / Obs..." className={`w-full p-4 bg-black/30 rounded-xl text-xs text-slate-200 border-none outline-none focus:ring-2 focus:ring-red-600/50 ${(form.items[i.id].status === 'FA' || form.items[i.id].status === 'FALTA') ? 'bg-red-950/20 placeholder-red-900 italic font-bold' : ''}`} value={form.items[i.id].obs} onChange={e => setForm({...form, items: {...form.items, [i.id]: {...form.items[i.id], obs: e.target.value}}})} />
                                </div>
                            ))}

                            {isFinal && (
                                <div className="space-y-8 animate-fade mt-10">
                                    <div className="glass p-8 rounded-[2rem]">
                                        <h3 className="font-black text-white text-sm uppercase mb-4">Observações Gerais</h3>
                                        <textarea rows="4" placeholder="Descreva intercorrências da viatura, pendências de manutenção..." className="w-full p-5 bg-black/40 border border-white/10 rounded-2xl font-bold text-white text-xs outline-none focus:border-red-500" value={form.obs} onChange={e => setForm({...form, obs: e.target.value})}></textarea>
                                    </div>
                                    <div className="text-center space-y-6">
                                        <button onClick={send} disabled={loading} className="w-full bg-red-600 text-white font-black py-7 rounded-[2rem] shadow-[0_0_30px_rgba(220,38,38,0.4)] active:scale-95 transition-all text-sm uppercase tracking-widest">
                                            {loading ? 'SINCRONIZANDO COM HACO...' : 'TRANSMITIR AUDITORIA'}
                                        </button>
                                    </div>
                                </div>
                            )}
                        </main>

                        <footer className="fixed bottom-0 left-0 right-0 p-6 glass border-t border-white/5 flex gap-4 bg-slate-950/95 z-50">
                            {step > 0 && <button onClick={() => setStep(step - 1)} className="flex-1 bg-white/5 p-5 rounded-2xl font-black uppercase text-xs text-slate-400">Voltar</button>}
                            {!isFinal && <button onClick={() => setStep(step + 1)} className="flex-[2] bg-white text-black p-5 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Continuar</button>}
                        </footer>
                    </div>
                );
            }

            // --- VIEW: DASHBOARD DESKTOP/TV ---
            if (view === 'admin') return (
                <div className="min-h-screen flex bg-[#020617] animate-fade">
                    <aside className="w-24 bg-slate-900 border-r border-white/5 flex flex-col items-center py-10 gap-8">
                        <div className="bg-red-600 p-4 rounded-2xl shadow-lg shadow-red-900/50"><i data-lucide="shield-check" className="text-white"></i></div>
                        <button onClick={() => setTab('monitor')} className={`p-4 rounded-xl ${tab === 'monitor' ? 'bg-red-600 text-white' : 'text-slate-600'}`}><i data-lucide="layout-dashboard"></i></button>
                        <button onClick={() => setTab('report')} className={`p-4 rounded-xl ${tab === 'report' ? 'bg-red-600 text-white' : 'text-slate-600'}`}><i data-lucide="file-text"></i></button>
                        <button onClick={sync} className="p-4 text-slate-500 hover:text-white transition-all"><i data-lucide="refresh-cw" className={loading ? 'animate-spin' : ''}></i></button>
                        <button onClick={() => setView('menu')} className="mt-auto p-4 text-slate-700 hover:text-red-500 transition-all"><i data-lucide="log-out"></i></button>
                    </aside>

                    <main className="flex-1 p-12 overflow-y-auto space-y-12">
                        {tab === 'monitor' ? (
                            <>
                                <header className="flex justify-between items-end border-b border-white/5 pb-10">
                                    <div><h1 className="text-8xl font-black tracking-tighter uppercase italic text-white leading-none">PRONTIDÃO <span className="text-red-600">SAE</span></h1><p className="text-slate-500 font-mono text-sm uppercase mt-4 tracking-[0.5em]">Ops Center - Auditoria SAMU Canoas</p></div>
                                    <div className="glass p-12 rounded-[3rem] text-center min-w-[280px] border-t-8 border-emerald-500">
                                        <span className="text-8xl font-black text-emerald-400 font-mono leading-none">{audit.op}%</span>
                                        <p className="text-xs font-black text-slate-500 mt-4 tracking-widest uppercase italic">Frota Operacional</p>
                                    </div>
                                </header>

                                <div className="grid grid-cols-3 gap-8">
                                    {VIATURAS.map(v => (
                                        <div key={v.id} className="glass p-8 rounded-[2.5rem] relative overflow-hidden border border-white/5">
                                            <h4 className="text-sm font-black text-white uppercase tracking-widest mb-8 border-b border-white/5 pb-4 italic">{v.label}</h4>
                                            <div className="space-y-6">
                                                {['MANHÃ', 'TARDE', 'NOITE'].map(s => {
                                                    const log = audit.shifts[v.label][s[0]];
                                                    return (
                                                        <div key={s} className="flex justify-between items-center">
                                                            <div><span className="block text-[10px] font-black text-slate-600 uppercase mb-1">{s}</span>{log?.ok && <span className="text-sm font-bold text-white uppercase italic underline decoration-red-600 tracking-tighter">{log.u}</span>}</div>
                                                            <span className={`px-4 py-2 rounded-xl text-[10px] font-black ${log?.ok ? 'bg-emerald-500/10 text-emerald-400' : 'bg-red-500/10 text-red-500 animate-pulse'}`}>{log?.ok ? 'CHECK' : 'PENDENTE'}</span>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="glass p-12 rounded-[3.5rem] border border-red-900/30 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-64 h-64 bg-red-600/5 blur-[100px] rounded-full"></div>
                                    <h3 className="text-sm font-black uppercase text-red-500 tracking-[0.5em] mb-10 flex items-center gap-4 italic"><i data-lucide="alert-triangle" className="animate-pulse"></i> Não Conformidades (NC) / Avarias</h3>
                                    <div className="grid grid-cols-2 gap-6 relative z-10">
                                        {audit.alerts.map((a, i) => (
                                            <div key={i} className="flex justify-between items-center p-6 bg-slate-950/80 rounded-3xl border border-white/5">
                                                <div className="flex items-center gap-6 italic uppercase">
                                                    <div className="bg-red-600/20 text-red-500 p-4 rounded-xl"><i data-lucide="activity"></i></div>
                                                    <div><p className="text-xl font-black leading-none text-white">{a.i}</p><p className="text-xs text-red-400 mt-2 font-bold">{a.o}</p></div>
                                                </div>
                                                <div className="text-right font-mono"><p className="text-sm font-black text-slate-400">{a.r}</p><p className="text-xs text-slate-600 mt-1">{a.p}</p></div>
                                            </div>
                                        ))}
                                        {audit.alerts.length === 0 && <div className="col-span-2 text-center py-10 opacity-20 font-black uppercase tracking-[1em] text-3xl">Padrão 100%</div>}
                                    </div>
                                </div>
                            </>
                        ) : (
                            <div className="space-y-12 animate-fade">
                                <h1 className="text-6xl font-black text-white italic tracking-tighter uppercase leading-none">Relatório <span className="text-red-600 underline">Auditoria</span></h1>
                                <div className="grid grid-cols-1 gap-6">
                                    {audit.history.map((h, i) => (
                                        <div key={i} className="glass p-8 rounded-3xl flex justify-between items-center border border-white/5 hover:bg-white/5 transition-all">
                                            <div className="flex gap-10 items-center">
                                                <span className="text-slate-500 font-mono text-sm">{h.ts}</span>
                                                <span className="font-black text-white italic text-xl w-32">{h.v}</span>
                                                <div><p className="text-red-500 font-bold uppercase">{h.r}</p><p className="text-xs text-slate-500 font-mono mt-1">{h.p}</p></div>
                                            </div>
                                            <div className="text-right">
                                                <span className={`px-4 py-2 rounded-xl text-xs font-black ${h.errs === 0 ? 'bg-emerald-500/10 text-emerald-500' : 'bg-red-500/10 text-red-500'}`}>
                                                    {h.errs === 0 ? '100% CONFORME' : `${h.errs} FALHAS REGISTRADAS`}
                                                </span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );

            if (view === 'sucesso') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 bg-slate-950 text-center animate-fade">
                    <div className="w-32 h-32 bg-emerald-500/20 text-emerald-500 rounded-[3rem] flex items-center justify-center mb-10 animate-bounce border border-emerald-500/30"><i data-lucide="check-circle" className="w-16 h-16"></i></div>
                    <h1 className="text-6xl font-black italic text-white uppercase tracking-tighter leading-none mb-12">AUDITORIA<br/>REGISTRADA</h1>
                    <button onClick={() => { setView('menu'); window.location.reload(); }} className="w-full max-w-xs bg-white text-black font-black py-8 rounded-[2.5rem] shadow-2xl uppercase tracking-[0.2em] text-xs active:scale-95 transition-all">Voltar à Base</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
