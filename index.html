<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HACO - Gestão de Ambulâncias do HACO </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { border-bottom: 4px solid #ef4444; color: #ef4444; background: #fef2f2; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzaxizVCggOIIjdUVyEz7Yk-8YemrsG5HZ9thMdl_DDzok2T120mggXfkZYj5S4PoAT/exec"; 

        const AMBULANCE_TYPES = [
            { id: 'basica', label: 'Básica', color: 'bg-blue-500', text: 'text-blue-600', border: 'border-blue-200' },
            { id: 'avancada', label: 'Avançada', color: 'bg-rose-500', text: 'text-rose-600', border: 'border-rose-200' },
            { id: 'paje', label: 'PAJÉ', color: 'bg-emerald-500', text: 'text-emerald-600', border: 'border-emerald-200' },
            { id: 'missoes', label: 'Missões', color: 'bg-amber-500', text: 'text-amber-600', border: 'border-amber-200' }
        ];

        const CATEGORIES = [
            { id: 'info', label: 'Identificação', icon: 'shield' },
            { id: 'Insumos', label: 'Materiais Médicos', icon: 'package' },
            { id: 'Equipamentos', label: 'Equipamentos APH', icon: 'stethoscope' },
            { id: 'vias_aereas', label: 'Vias Aéreas', icon: 'wind' },
            { id: 'revisar', label: 'Finalizar', icon: 'check-circle' }
        ];

        // CHECKLIST AMPLIADO (BASEADO EM SAMU USB/USA)
        const MASTER_CHECKLIST = [
            // INSUMOS
            { id: 'esparadrapo', label: 'Esparadrapo / Micropore', cat: 'Insumos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'cateteres', label: 'Kit Cateteres (14 a 24)', cat: 'Insumos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'soro', label: 'Soro Fisiológico / Ringer', cat: 'Insumos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'kit_parto', label: 'Kit Parto Estéril', cat: 'Insumos', types: ['basica', 'avancada'] },
            
            // EQUIPAMENTOS
            { id: 'dea', label: 'DEA (Desfibrilador Externo)', cat: 'Equipamentos', types: ['basica', 'paje'] },
            { id: 'monitor', label: 'Monitor Multiparâmetros', cat: 'Equipamentos', types: ['avancada', 'missoes'] },
            { id: 'oximetro', label: 'Oxímetro de Pulso', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'gluco', label: 'Glicosímetro / Fitas', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'vent_mec', label: 'Ventilador Pulmonar Mecânico', cat: 'Equipamentos', types: ['avancada', 'missoes'] },
            { id: 'bomba_inf', label: 'Bomba de Infusão Contínua', cat: 'Equipamentos', types: ['avancada', 'missoes'] },
            { id: 'fluxometro', label: 'Fluxômetro O2 / Cilindro', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            
            // VIAS AÉREAS (SAMU USA)
            { id: 'laringo', label: 'Laringoscópio (Lâminas 0-5)', cat: 'vias_aereas', types: ['avancada', 'missoes'] },
            { id: 'tubos_ot', label: 'Tubos Endotraqueais (Vários)', cat: 'vias_aereas', types: ['avancada', 'missoes'] },
            { id: 'ambu', label: 'AMBU com reservatório', cat: 'vias_aereas', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'aspirador', label: 'Aspirador de Secreção', cat: 'vias_aereas', types: ['basica', 'avancada', 'paje', 'missoes'] }
        ];

        function App() {
            const [mode, setMode] = useState('selection');
            const [adminTab, setAdminTab] = useState('monitor'); // monitor ou historico
            const [selectedType, setSelectedType] = useState(null);
            const [currentStep, setCurrentStep] = useState(0);
            const [loading, setLoading] = useState(false);
            const [submitted, setSubmitted] = useState(false);
            const [formData, setFormData] = useState({ placa: '', posto: '', nomeGuerra: '', items: {} });
            const [adminData, setAdminData] = useState([]);
            const [loginData, setLoginData] = useState({ pass: '' });

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [mode, adminTab, currentStep, submitted, adminData]);

            // --- LÓGICA DE AUDITORIA E HISTÓRICO ---
            const audit = useMemo(() => {
                if (!adminData.length) return { operacional: 0, alerts: [], shifts: {}, history: [] };
                
                const today = new Date().toLocaleDateString('pt-BR');
                const conforme = adminData.filter(d => d[5] === 'C').length;
                
                // Agrupamento para Histórico Detalhado
                const grouped = adminData.reduce((acc, row) => {
                    const key = `${row[0]}_${row[2]}`; // Data + Placa
                    if (!acc[key]) acc[key] = { timestamp: row[0], tipo: row[1], placa: row[2], resp: row[3], items: [] };
                    acc[key].items.push({ nome: row[4], status: row[5], obs: row[6] });
                    return acc;
                }, {});

                const history = Object.values(grouped).reverse();
                const ncItems = adminData.filter(d => d[5] === 'NC').map(d => ({
                    data: d[0], tipo: d[1], placa: d[2], resp: d[3], item: d[4], obs: d[6]
                })).reverse();

                // Turnos
                const shifts = {};
                AMBULANCE_TYPES.forEach(t => {
                    const logsToday = adminData.filter(d => d[1] === t.label && d[0].includes(today));
                    const getShift = (start, end) => {
                        const log = logsToday.find(d => {
                            const h = parseInt(d[0].match(/(\d{2}):/)[1]);
                            return h >= start && h < end;
                        });
                        return log ? { ok: true, resp: log[3] } : { ok: false };
                    };
                    shifts[t.label] = { 
                        MANHÃ: getShift(7, 13), TARDE: getShift(13, 19), 
                        NOITE: logsToday.find(d => { const h = parseInt(d[0].match(/(\d{2}):/)[1]); return h >= 19 || h < 7; }) ? { ok: true, resp: logsToday.find(d => { const h = parseInt(d[0].match(/(\d{2}):/)[1]); return h >= 19 || h < 7; })[3] } : { ok: false }
                    };
                });

                return { operacional: Math.round((conforme / adminData.length) * 100), alerts: ncItems.slice(0, 6), shifts, history };
            }, [adminData]);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${GOOGLE_SHEET_URL}?action=read&t=${Date.now()}`);
                    const data = await res.json();
                    setAdminData(data);
                    setMode('admin');
                } catch (e) { alert("Erro de sincronização."); }
                setLoading(false);
            };

            const resetApp = () => {
                setSubmitted(false); setSelectedType(null); setCurrentStep(0);
                setFormData({ placa: '', posto: '', nomeGuerra: '', items: {} });
                setMode('selection');
            };

            const handleTypeSelect = (type) => {
                setSelectedType(type);
                const items = {};
                MASTER_CHECKLIST.filter(i => i.types.includes(type.id)).forEach(i => { items[i.id] = { status: 'C', obs: '' }; });
                setFormData({ ...formData, items });
                setMode('user');
            };

            const handleSubmit = async () => {
                setLoading(true);
                const payload = {
                    action: 'write', tipo: selectedType.label, placa: formData.placa,
                    responsavel: `${formData.posto} ${formData.nomeGuerra}`,
                    items: Object.entries(formData.items).map(([id, val]) => ({ nome: MASTER_CHECKLIST.find(i => i.id === id).label, status: val.status, obs: val.obs }))
                };
                try {
                    await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setSubmitted(true);
                } catch (e) { alert("Erro ao salvar."); }
                setLoading(false);
            };

            // --- DASHBOARD GESTÃO (LIGHT & DETALHADO) ---
            if (mode === 'admin') {
                return (
                    <div className="min-h-screen flex flex-col lg:flex-row animate-fade-in bg-slate-50">
                        <aside className="lg:w-72 bg-white border-r border-slate-200 p-8 flex flex-col justify-between">
                            <div className="space-y-10">
                                <div className="flex items-center gap-4">
                                    <div className="bg-red-600 p-3 rounded-2xl text-white shadow-lg"><i data-lucide="shield-check"></i></div>
                                    <h2 className="font-black text-xs uppercase text-red-600 leading-tight tracking-widest">Gestão<br/><span className="text-slate-900 text-lg">Ambulâncias</span></h2>
                                </div>
                                <nav className="space-y-3">
                                    <button onClick={() => setAdminTab('monitor')} className={`w-full flex items-center gap-3 p-4 rounded-2xl font-black text-xs uppercase tracking-widest transition-all ${adminTab === 'monitor' ? 'bg-red-50 text-red-600 shadow-sm border border-red-100' : 'text-slate-400 hover:bg-slate-100'}`}><i data-lucide="layout-dashboard"></i> Monitor Global</button>
                                    <button onClick={() => setAdminTab('historico')} className={`w-full flex items-center gap-3 p-4 rounded-2xl font-black text-xs uppercase tracking-widest transition-all ${adminTab === 'historico' ? 'bg-red-50 text-red-600 shadow-sm border border-red-100' : 'text-slate-400 hover:bg-slate-100'}`}><i data-lucide="file-text"></i> Relatórios</button>
                                    <button onClick={fetchData} className="w-full flex items-center gap-3 p-4 text-slate-400 hover:bg-slate-100 rounded-2xl font-black text-xs uppercase transition-all"><i data-lucide="refresh-cw" className={loading ? 'animate-spin' : ''}></i> Sincronizar</button>
                                </nav>
                            </div>
                            <button onClick={resetApp} className="p-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase shadow-xl hover:bg-red-600 transition-all">Sair do Comando</button>
                        </aside>

                        <main className="flex-1 p-6 lg:p-12 overflow-y-auto space-y-10">
                            {adminTab === 'monitor' ? (
                                <div className="space-y-10 animate-fade-in">
                                    <header className="flex justify-between items-end bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100">
                                        <div>
                                            <h1 className="text-5xl font-black text-slate-900 tracking-tighter uppercase italic leading-none">Prontidão <span className="text-red-600">Global</span></h1>
                                            <p className="text-slate-400 font-bold text-[10px] uppercase tracking-[0.4em] mt-4 italic">Monitoramento de Equipamentos APH</p>
                                        </div>
                                        <div className="text-center p-6 bg-emerald-50 rounded-[2.5rem] border border-emerald-100 min-w-[150px]">
                                            <span className="text-5xl font-black text-emerald-600">{audit.operacional}%</span>
                                            <p className="text-[8px] font-black text-emerald-500 uppercase tracking-widest mt-1">Frota Conforme</p>
                                        </div>
                                    </header>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        {AMBULANCE_TYPES.map(t => (
                                            <div key={t.id} className={`bg-white p-8 rounded-[3rem] shadow-sm border-t-[12px] ${t.border}`}>
                                                <h4 className={`text-[11px] font-black ${t.text} uppercase tracking-widest mb-8 border-b pb-4`}>{t.label}</h4>
                                                <div className="space-y-6">
                                                    {['MANHÃ', 'TARDE', 'NOITE'].map(s => (
                                                        <div key={s} className="space-y-1">
                                                            <div className="flex justify-between items-center text-[10px] font-black uppercase">
                                                                <span className="text-slate-300 italic">{s}</span>
                                                                <span className={audit.shifts[t.label][s].ok ? 'text-emerald-500' : 'text-rose-500 animate-pulse'}>{audit.shifts[t.label][s].ok ? '✓ OK' : 'PENDENTE'}</span>
                                                            </div>
                                                            {audit.shifts[t.label][s].ok && <p className="text-[10px] font-extrabold text-slate-600 uppercase italic tracking-tighter">{audit.shifts[t.label][s].resp}</p>}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="bg-white rounded-[4rem] p-10 shadow-sm border border-slate-100">
                                        <h3 className="text-xs font-black uppercase text-red-500 tracking-[0.3em] mb-10 flex items-center gap-3 italic"><i data-lucide="zap"></i> Alertas de Falhas Recentes</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {audit.alerts.map((a, i) => (
                                                <div key={i} className="flex justify-between items-center p-6 bg-rose-50 rounded-[2.5rem] border border-rose-100">
                                                    <div className="flex items-center gap-5">
                                                        <div className="bg-rose-500 text-white p-4 rounded-3xl"><i data-lucide="alert-triangle"></i></div>
                                                        <div>
                                                            <p className="text-sm font-black uppercase italic text-rose-900 leading-none">{a.item}</p>
                                                            <p className="text-[10px] font-bold text-rose-400 uppercase mt-2">{a.obs || "Faltante / Inoperante"}</p>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <span className="block text-[11px] font-black text-slate-800 uppercase italic">{a.resp}</span>
                                                        <span className="text-[9px] font-bold text-slate-400 uppercase mt-2">{a.placa}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-8 animate-fade-in">
                                    <header>
                                        <h1 className="text-4xl font-black text-slate-900 tracking-tighter uppercase italic">Histórico <span className="text-red-600">Detallhado</span></h1>
                                        <p className="text-slate-400 font-bold text-[10px] uppercase tracking-[0.3em] mt-3 italic">Registros completos por verificação efetuada</p>
                                    </header>
                                    
                                    <div className="grid grid-cols-1 gap-6">
                                        {audit.history.map((reg, i) => (
                                            <div key={i} className="bg-white rounded-[3rem] shadow-sm border border-slate-100 overflow-hidden">
                                                <div className="p-8 bg-slate-50 border-b flex justify-between items-center">
                                                    <div>
                                                        <span className="bg-slate-200 text-slate-600 px-3 py-1 rounded-full text-[9px] font-black uppercase mb-3 inline-block tracking-widest">{reg.tipo}</span>
                                                        <h3 className="text-3xl font-black text-slate-900 tracking-tighter uppercase italic leading-none">{reg.placa}</h3>
                                                        <p className="text-[11px] font-black text-red-500 uppercase tracking-widest mt-2">{reg.resp}</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-lg font-black text-slate-800 tracking-tighter italic leading-none">{reg.timestamp.split(', ')[1]}</p>
                                                        <p className="text-[11px] font-bold text-slate-400 uppercase mt-1">{reg.timestamp.split(', ')[0]}</p>
                                                    </div>
                                                </div>
                                                <div className="p-8">
                                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                                        {reg.items.map((it, idx) => (
                                                            <div key={idx} className={`p-4 rounded-2xl flex justify-between items-center border ${it.status === 'C' ? 'bg-emerald-50 border-emerald-100' : 'bg-rose-50 border-rose-200'}`}>
                                                                <div className="max-w-[70%]">
                                                                    <p className="text-[11px] font-black uppercase text-slate-800 leading-tight">{it.nome}</p>
                                                                    {it.obs && <p className="text-[9px] font-bold text-rose-500 italic mt-1 uppercase">Obs: {it.obs}</p>}
                                                                </div>
                                                                <span className={`px-2 py-1 rounded-lg text-[9px] font-black ${it.status === 'C' ? 'text-emerald-600 bg-white' : 'text-rose-600 bg-white'}`}>{it.status}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                );
            }

            // --- SELEÇÃO DE VIATURA ---
            if (mode === 'selection') {
                return (
                    <div className="min-h-screen p-8 flex flex-col justify-center animate-fade-in bg-slate-50">
                        <div className="max-w-md mx-auto w-full space-y-12 text-center">
                            <div className="space-y-4">
                                <div className="bg-red-600 w-24 h-24 rounded-[2.5rem] flex items-center justify-center mx-auto shadow-2xl text-white mb-8"><i data-lucide="cross" className="w-12 h-12"></i></div>
                                <h1 className="text-6xl font-black text-slate-900 tracking-tighter uppercase italic leading-none">Ambulâncias <span className="text-red-600">HACO</span></h1>
                                <p className="text-slate-400 font-bold uppercase text-[10px] tracking-[0.4em] italic">Gestão de Materiais e Equipamentos de Saúde</p>
                            </div>
                            <div className="grid grid-cols-2 gap-6">
                                {AMBULANCE_TYPES.map(t => (
                                    <button key={t.id} onClick={() => handleTypeSelect(t)} className="bg-white p-8 rounded-[3.5rem] shadow-sm flex flex-col items-center gap-6 active:scale-95 transition-all border-4 border-transparent hover:border-red-600 group">
                                        <div className={`${t.color} p-6 rounded-3xl text-white shadow-xl group-hover:scale-110 transition-transform`}><i data-lucide="truck"></i></div>
                                        <span className="font-black text-slate-800 uppercase text-[10px] tracking-widest">{t.label}</span>
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => setMode('login')} className="w-full py-8 text-slate-400 font-black text-[11px] uppercase tracking-widest hover:text-red-500 transition-colors italic border-t border-slate-200 pt-10">Painel de Gestão Gestor</button>
                        </div>
                    </div>
                );
            }

            if (mode === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50 animate-fade-in">
                        <div className="w-full max-w-sm bg-white p-12 rounded-[4rem] shadow-2xl text-center border border-white">
                            <div className="bg-red-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-8 text-white shadow-xl shadow-red-200"><i data-lucide="lock" className="w-8 h-8"></i></div>
                            <h2 className="text-3xl font-black uppercase tracking-tighter text-slate-900 italic leading-none">Acesso<br/>Gestor</h2>
                            <input type="password" placeholder="SENHA DE ACESSO" className="w-full p-6 bg-slate-50 rounded-[2rem] outline-none font-black text-center text-sm border-2 border-transparent focus:border-red-500 transition-all uppercase my-10" value={loginData.pass} onChange={e => setLoginData({...loginData, pass: e.target.value})} />
                            <button onClick={() => loginData.pass === 'sdenf2026' ? fetchData() : alert("Negado")} className="w-full bg-slate-900 text-white font-black py-7 rounded-[2.5rem] shadow-xl uppercase tracking-widest text-[11px] active:scale-95 transition-all italic">Entrar no Comando</button>
                            <button onClick={resetApp} className="mt-8 text-slate-400 font-bold text-[10px] uppercase tracking-widest italic">Voltar</button>
                        </div>
                    </div>
                );
            }

            // --- FORMULÁRIO DE CHECKLIST (USB/USA) ---
            const items = MASTER_CHECKLIST.filter(i => i.types.includes(selectedType?.id) && i.cat === CATEGORIES[currentStep].id);

            return (
                <div className="min-h-screen pb-44 animate-fade-in bg-white">
                    <header className={`sticky top-0 z-50 ${selectedType?.color} text-white p-8 shadow-2xl flex justify-between items-center rounded-b-[4rem]`}>
                        <div className="flex items-center gap-6">
                            <button onClick={resetApp} className="bg-white/20 p-3 rounded-2xl border border-white/10"><i data-lucide="chevron-left"></i></button>
                            <div>
                                <h1 className="font-black text-2xl italic tracking-tighter leading-none uppercase">{selectedType?.label}</h1>
                                <p className="text-[10px] font-black uppercase opacity-70 tracking-widest italic mt-1">Suporte {selectedType?.id === 'basica' ? 'USB' : 'USA'}</p>
                            </div>
                        </div>
                        <div className="bg-black/20 px-5 py-2.5 rounded-2xl border border-white/10 text-xs font-black italic">{currentStep + 1} / {CATEGORIES.length}</div>
                    </header>

                    <nav className="flex overflow-x-auto no-scrollbar sticky top-[110px] z-40 px-6 py-5 bg-white border-b border-slate-50 shadow-sm">
                        {CATEGORIES.map((cat, idx) => (
                            <button key={cat.id} className={`flex-1 min-w-[110px] py-4 flex flex-col items-center gap-1 border-b-4 transition-all ${idx === currentStep ? 'border-red-600 text-red-600' : 'border-transparent text-slate-300'}`}>
                                <i data-lucide={cat.icon} className="w-4 h-4"></i>
                                <span className="text-[9px] font-black uppercase tracking-tighter">{cat.label}</span>
                            </button>
                        ))}
                    </nav>

                    <main className="max-w-md mx-auto p-6 pt-12 space-y-8">
                        {CATEGORIES[currentStep].id === 'info' && (
                            <div className="bg-slate-50 p-12 rounded-[4rem] space-y-10 shadow-inner border border-slate-100 animate-fade-in">
                                <div className="text-center">
                                    <h2 className="text-3xl font-black text-slate-900 uppercase tracking-tighter italic leading-none">Identificação Militar</h2>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mt-3 italic leading-none">Protocolo SAE Obrigatório</p>
                                </div>
                                <div className="space-y-6">
                                    <input type="text" placeholder="VIATURA / PLACA" className="w-full p-8 rounded-[2.5rem] bg-white border-2 border-transparent focus:border-red-500 outline-none font-black text-4xl text-center uppercase shadow-sm" value={formData.placa} onChange={e => setFormData({...formData, placa: e.target.value.toUpperCase()})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="text" placeholder="POSTO (Ex: 1T)" className="w-full p-6 rounded-[2rem] bg-white border-2 border-transparent focus:border-red-500 outline-none font-bold text-center uppercase text-sm" value={formData.posto} onChange={e => setFormData({...formData, posto: e.target.value.toUpperCase()})} />
                                        <input type="text" placeholder="NOME DE GUERRA" className="w-full p-6 rounded-[2rem] bg-white border-2 border-transparent focus:border-red-500 outline-none font-bold text-center uppercase text-sm" value={formData.nomeGuerra} onChange={e => setFormData({...formData, nomeGuerra: e.target.value.toUpperCase()})} />
                                    </div>
                                </div>
                            </div>
                        )}

                        {items.map(item => (
                            <div key={item.id} className="bg-white p-8 rounded-[3.5rem] shadow-sm border border-slate-100 animate-fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <span className="font-black text-slate-800 text-lg uppercase italic leading-tight pr-4">{item.label}</span>
                                    <div className="flex bg-slate-50 p-2 rounded-2xl shadow-inner border border-slate-100">
                                        <button onClick={() => setFormData({...formData, items: {...formData.items, [item.id]: {status: 'C', obs: ''}}})} className={`px-8 py-4 rounded-xl text-xs font-black transition-all ${formData.items[item.id]?.status === 'C' ? 'bg-emerald-500 text-white shadow-xl scale-110' : 'text-slate-300'}`}>C</button>
                                        <button onClick={() => setFormData({...formData, items: {...formData.items, [item.id]: {status: 'NC', obs: ''}}})} className={`px-8 py-4 rounded-xl text-xs font-black transition-all ${formData.items[item.id]?.status === 'NC' ? 'bg-red-500 text-white shadow-xl scale-110' : 'text-slate-300'}`}>NC</button>
                                    </div>
                                </div>
                                <input type="text" placeholder="Observação técnica..." className={`w-full p-6 text-xs rounded-3xl bg-slate-50 border-none outline-none focus:ring-4 focus:ring-red-100 transition-all ${formData.items[item.id]?.status === 'NC' ? 'bg-red-50 text-red-500 font-bold italic' : ''}`} value={formData.items[item.id]?.obs || ''} onChange={e => setFormData({...formData, items: {...formData.items, [item.id]: {...formData.items[item.id], obs: e.target.value}}})} />
                            </div>
                        ))}

                        {CATEGORIES[currentStep].id === 'revisar' && (
                            <div className="bg-red-600 text-white p-12 rounded-[5rem] text-center shadow-2xl space-y-10 border-t-8 border-red-700">
                                <div className="bg-white/20 w-24 h-24 rounded-full flex items-center justify-center mx-auto"><i data-lucide="send" className="w-12 h-12"></i></div>
                                <h2 className="text-4xl font-black italic uppercase leading-none tracking-tighter">Finalizar<br/>Transmissão</h2>
                                <button onClick={handleSubmit} disabled={loading} className="w-full bg-slate-900 text-white font-black py-9 rounded-[3rem] shadow-2xl uppercase tracking-[0.3em] text-[12px] active:scale-95 transition-all italic">
                                    {loading ? 'SINCRONIZANDO...' : 'EXECUTAR GRAVAÇÃO'}
                                </button>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 p-10 bg-white/90 backdrop-blur-3xl border-t border-slate-100 flex gap-6 z-50 rounded-t-[5rem] shadow-2xl">
                        <div className="max-w-md mx-auto w-full flex gap-6">
                            {currentStep > 0 && <button onClick={() => setCurrentStep(s => s - 1)} className="flex-1 bg-white border-4 border-slate-100 text-slate-400 font-black py-7 rounded-[2.5rem] uppercase text-[11px] tracking-widest italic transition-all">Anterior</button>}
                            {currentStep < CATEGORIES.length - 1 && <button onClick={() => setCurrentStep(s => s + 1)} className="flex-[2] bg-slate-900 text-white font-black py-7 rounded-[2.5rem] shadow-2xl uppercase text-[10px] tracking-widest italic active:scale-95 border border-white/10">Próximo Passo</button>}
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
