<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HACO - Gestão de Prontidão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURAÇÃO ---
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzaxizVCggOIIjdUVyEz7Yk-8YemrsG5HZ9thMdl_DDzok2T120mggXfkZYj5S4PoAT/exec"; 

        const AMBULANCE_TYPES = [
            { id: 'basica', label: 'Básica', icon: 'truck', color: 'bg-blue-600' },
            { id: 'avancada', label: 'Avançada', icon: 'zap', color: 'bg-red-600' },
            { id: 'paje', label: 'PAJÉ', icon: 'shield', color: 'bg-green-700' },
            { id: 'missoes', label: 'Missões', icon: 'plane', color: 'bg-slate-800' }
        ];

        const CATEGORIES = [
            { id: 'info', label: 'Início', icon: 'user' },
            { id: 'Insumos', label: 'Insumos', icon: 'package' },
            { id: 'Equipamentos', label: 'Equipamentos', icon: 'stethoscope' },
            { id: 'revisar', label: 'Finalizar', icon: 'check-circle' }
        ];

        const MASTER_CHECKLIST = [
            { id: 'esparadrapo', label: 'Esparadrapo', cat: 'Insumos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'micropore', label: 'Micropore', cat: 'Insumos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'dea', label: 'DEA / Monitor', cat: 'Equipamentos', types: ['avancada', 'missoes'] },
            { id: 'ventilador', label: 'Ventilador Mecânico', cat: 'Equipamentos', types: ['avancada', 'missoes'] },
            { id: 'oximetro', label: 'Oxímetro de Pulso', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje'] },
            { id: 'talas', label: 'Talas imobilização', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'radio_vhf', label: 'Rádio Tático VHF', cat: 'Equipamentos', types: ['paje', 'missoes'] },
            { id: 'manta_termica', label: 'Manta Térmica', cat: 'Insumos', types: ['paje', 'missoes'] },
        ];

        function App() {
            const [mode, setMode] = useState('selection'); 
            const [selectedType, setSelectedType] = useState(null);
            const [currentStep, setCurrentStep] = useState(0);
            const [loading, setLoading] = useState(false);
            const [submitted, setSubmitted] = useState(false);
            const [formData, setFormData] = useState({ placa: '', responsavel: '', items: {} });
            const [adminData, setAdminData] = useState([]);
            const [loginData, setLoginData] = useState({ user: '', pass: '' });

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [mode, currentStep, submitted]);

            // Cálculo de Estatísticas do Dashboard
            const stats = useMemo(() => {
                if (adminData.length === 0) return { operacional: 0, alertas: [], total: 0 };
                const total = adminData.length;
                const conforme = adminData.filter(d => d[5] === 'C').length;
                const alertas = adminData.filter(d => d[5] === 'NC').map(d => ({
                    data: d[0], tipo: d[1], placa: d[2], item: d[4], obs: d[6]
                })).reverse().slice(0, 5);
                return { operacional: Math.round((conforme / total) * 100), alertas, total };
            }, [adminData]);

            const fetchAdminData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${GOOGLE_SHEET_URL}?action=read`);
                    const data = await res.json();
                    setAdminData(data);
                    setMode('admin');
                } catch (e) { alert("Erro ao carregar dados."); }
                setLoading(false);
            };

            const handleTypeSelect = (type) => {
                setSelectedType(type);
                const initialItems = {};
                MASTER_CHECKLIST.filter(i => i.types.includes(type.id)).forEach(i => {
                    initialItems[i.id] = { status: 'C', obs: '' };
                });
                setFormData({ placa: '', responsavel: '', items: initialItems });
                setMode('user');
                setCurrentStep(0);
            };

            const handleSubmit = async () => {
                if (!formData.placa || !formData.responsavel) return alert("Preencha a identificação.");
                setLoading(true);
                const payload = {
                    action: 'write',
                    tipo: selectedType.label,
                    placa: formData.placa,
                    responsavel: formData.responsavel,
                    items: Object.entries(formData.items).map(([id, val]) => ({
                        nome: MASTER_CHECKLIST.find(i => i.id === id).label,
                        status: val.status,
                        obs: val.obs
                    }))
                };
                try {
                    await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setSubmitted(true);
                } catch (e) { alert("Erro de conexão."); }
                setLoading(false);
            };

            // VIEWS
            if (submitted) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center bg-white animate-fade-in">
                        <div className="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mb-6 shadow-inner text-green-600">
                            <i data-lucide="check-circle-2" className="w-10 h-10"></i>
                        </div>
                        <h1 className="text-2xl font-black mb-2 uppercase tracking-tight">Registro Concluído!</h1>
                        <p className="text-slate-400 mb-8 font-medium">Dados enviados para auditoria do HACO.</p>
                        <button onClick={() => { setSubmitted(false); setMode('selection'); }} className="w-full max-w-xs bg-slate-900 text-white font-black py-5 rounded-3xl shadow-xl uppercase tracking-widest text-xs transition-all active:scale-95">Nova Verificação</button>
                    </div>
                );
            }

            if (mode === 'admin') {
    // Agrupamento por Tipo para o Grid da Frota
    const fleetStatus = useMemo(() => {
        const types = ['Básica', 'Avançada', 'PAJÉ', 'Missões'];
        return types.map(t => {
            const logs = adminData.filter(d => d[1] === t);
            const totalItems = logs.length;
            const ncItems = logs.filter(d => d[5] === 'NC').length;
            const percentage = totalItems > 0 ? Math.round(((totalItems - ncItems) / totalItems) * 100) : 0;
            return { type: t, ok: percentage, total: totalItems, hasNC: ncItems > 0 };
        });
    }, [adminData]);

    return (
        <div className="min-h-screen bg-slate-100 flex flex-col lg:flex-row animate-fade-in">
            {/* Sidebar Tática */}
            <aside className="lg:w-64 bg-slate-900 text-white p-6 flex flex-col justify-between shadow-2xl">
                <div className="space-y-8">
                    <div className="flex items-center gap-3 border-b border-slate-800 pb-6">
                        <div className="bg-red-600 p-2 rounded-lg shadow-lg shadow-red-900/20"><i data-lucide="shield-check"></i></div>
                        <div>
                            <h2 className="font-black text-[10px] uppercase tracking-tighter leading-none italic text-red-500">Comando de Enfermagem</h2>
                            <p className="text-[12px] font-black uppercase tracking-widest mt-1">HACO OPS</p>
                        </div>
                    </div>
                    <nav className="space-y-1">
                        <button className="w-full flex items-center gap-3 p-3 bg-white/5 text-white rounded-xl font-bold text-xs"><i data-lucide="layout-dashboard" className="w-4 h-4"></i> DASHBOARD</button>
                        <button className="w-full flex items-center gap-3 p-3 text-slate-500 hover:text-white rounded-xl font-bold text-xs transition-all"><i data-lucide="file-text" className="w-4 h-4"></i> RELATÓRIOS SAE</button>
                        <button onClick={fetchAdminData} className="w-full flex items-center gap-3 p-3 text-slate-500 hover:text-white rounded-xl font-bold text-xs transition-all"><i data-lucide="refresh-cw" className={`w-4 h-4 ${loading ? 'animate-spin' : ''}`}></i> ATUALIZAR</button>
                    </nav>
                </div>
                <button onClick={() => setMode('selection')} className="text-slate-500 font-black text-[10px] uppercase tracking-widest hover:text-white transition-colors">Voltar ao Início</button>
            </aside>

            {/* Sala de Situação */}
            <main className="flex-1 p-4 lg:p-8 space-y-6 overflow-y-auto">
                <header className="flex flex-col md:flex-row justify-between items-end border-b pb-6 gap-4">
                    <div>
                        <h1 className="text-4xl font-black text-slate-900 tracking-tighter uppercase italic leading-none">Status de Prontidão</h1>
                        <p className="text-slate-400 font-bold text-[10px] uppercase tracking-[0.3em] mt-2">Hospital de Aeronáutica de Canoas</p>
                    </div>
                    <div className="flex gap-2">
                        <div className="bg-white p-4 rounded-3xl shadow-sm border border-slate-200 text-center min-w-[120px]">
                            <span className="block text-[8px] font-black text-slate-400 uppercase mb-1">Operacionalidade</span>
                            <span className="text-2xl font-black text-green-600 leading-none">{stats.operacional}%</span>
                        </div>
                    </div>
                </header>

                {/* Grid de Frota Real-time */}
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    {fleetStatus.map((v, i) => (
                        <div key={i} className="bg-white p-5 rounded-[2rem] shadow-sm border-b-4 border-slate-200 relative overflow-hidden group hover:border-red-500 transition-all">
                            <div className="flex justify-between items-start mb-4">
                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{v.type}</span>
                                <div className={`w-3 h-3 rounded-full ${v.ok > 90 ? 'bg-green-500' : 'bg-red-500'} animate-pulse`}></div>
                            </div>
                            <h4 className="text-3xl font-black text-slate-800 leading-none">{v.ok}%</h4>
                            <p className="text-[9px] font-bold text-slate-400 mt-2 italic">{v.total} itens verificados</p>
                            {v.hasNC && <div className="absolute -right-2 -bottom-2 opacity-10 text-red-600"><i data-lucide="alert-triangle" className="w-16 h-16"></i></div>}
                        </div>
                    ))}
                </div>

                <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
                    {/* Alertas Críticos APH */}
                    <div className="xl:col-span-2 bg-slate-900 text-white rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden">
                        <div className="relative z-10">
                            <h3 className="text-sm font-black uppercase tracking-widest mb-6 flex items-center gap-2 text-red-500">
                                <i data-lucide="zap" className="w-4 h-4"></i> Falhas Críticas Detectadas
                            </h3>
                            <div className="space-y-3">
                                {stats.alertas.length > 0 ? stats.alertas.map((a, i) => (
                                    <div key={i} className="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/10 hover:bg-white/10 transition-all">
                                        <div className="flex items-center gap-4">
                                            <div className="bg-red-600 p-2 rounded-xl text-white shadow-lg"><i data-lucide="alert-circle" className="w-4 h-4"></i></div>
                                            <div>
                                                <p className="text-xs font-black uppercase italic">{a.item}</p>
                                                <p className="text-[10px] font-bold text-red-400 uppercase">{a.obs || "Material em falta"}</p>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <span className="block text-[10px] font-black uppercase text-slate-500">{a.placa}</span>
                                            <span className="text-[8px] font-bold text-slate-600">{a.data}</span>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="text-center py-10 opacity-30 font-black uppercase text-xs">Sistema 100% Operacional</div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Radar de Auditoria (Adesão) */}
                    <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200">
                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 italic">Monitor de Adesão SAE</h3>
                        <div className="space-y-6">
                            {/* Exemplo de visualização de quem está conferindo */}
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="bg-blue-100 text-blue-600 p-2 rounded-full"><i data-lucide="user" className="w-4 h-4"></i></div>
                                    <span className="text-xs font-black text-slate-700 uppercase">1T CIMIRRO</span>
                                </div>
                                <span className="bg-slate-100 px-3 py-1 rounded-full text-[9px] font-black">24 Registros</span>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    );
}

            if (mode === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900 animate-fade-in">
                        <div className="w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-2xl space-y-8">
                            <div className="text-center">
                                <div className="bg-red-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl text-white">
                                    <i data-lucide="lock"></i>
                                </div>
                                <h2 className="text-2xl font-black uppercase tracking-tighter text-slate-800">Painel Gestor</h2>
                            </div>
                            <div className="space-y-4">
                                <input type="text" placeholder="USUÁRIO" className="w-full p-4 bg-slate-100 rounded-2xl outline-none font-bold text-center" value={loginData.user} onChange={e => setLoginData({...loginData, user: e.target.value})} />
                                <input type="password" placeholder="SENHA" className="w-full p-4 bg-slate-100 rounded-2xl outline-none font-bold text-center" value={loginData.pass} onChange={e => setLoginData({...loginData, pass: e.target.value})} />
                            </div>
                            <button onClick={() => { if(loginData.user === 'admin' && loginData.pass === 'sdenf2026') fetchAdminData(); else alert("Acesso negado"); }} className="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-widest text-[10px]">Entrar</button>
                            <button onClick={() => setMode('selection')} className="w-full text-slate-400 text-[10px] font-black uppercase tracking-widest">Voltar</button>
                        </div>
                    </div>
                );
            }

            if (mode === 'selection') {
                return (
                    <div className="min-h-screen p-6 flex flex-col justify-center animate-fade-in bg-slate-100">
                        <div className="max-w-md mx-auto w-full space-y-8 text-center">
                            <div className="space-y-2">
                                <div className="bg-red-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto shadow-lg mb-4 text-white">
                                    <i data-lucide="cross" className="w-8 h-8"></i>
                                </div>
                                <h1 className="text-3xl font-black tracking-tighter text-slate-800 italic uppercase">Sistema HACO</h1>
                                <p className="text-slate-400 font-bold uppercase text-[9px] tracking-[0.2em]">Gestão de Prontidão de Viaturas</p>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                {AMBULANCE_TYPES.map(type => (
                                    <button key={type.id} onClick={() => handleTypeSelect(type)} className="bg-white p-6 rounded-[2.5rem] card-shadow flex flex-col items-center gap-4 active:scale-95 transition-all border-2 border-transparent hover:border-red-500 group">
                                        <div className={`${type.color} p-4 rounded-2xl text-white shadow-lg`}><i data-lucide={type.icon} className="w-6 h-6"></i></div>
                                        <span className="font-black text-slate-700 uppercase text-[10px] tracking-widest">{type.label}</span>
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => setMode('login')} className="w-full py-4 text-slate-400 font-bold text-[9px] uppercase tracking-widest">Acesso Administrativo</button>
                        </div>
                    </div>
                );
            }

            // FLUXO DE CHECKLIST (USER)
            const itemsToDisplay = MASTER_CHECKLIST.filter(item => item.types.includes(selectedType.id) && item.cat === CATEGORIES[currentStep].id);

            return (
                <div className="min-h-screen pb-32 animate-fade-in bg-white">
                    <header className={`sticky top-0 z-50 ${selectedType.color} text-white p-5 shadow-lg flex justify-between items-center`}>
                        <div className="flex items-center gap-3">
                            <button onClick={() => setMode('selection')} className="bg-white/20 p-2 rounded-xl"><i data-lucide="chevron-left" className="w-5 h-5"></i></button>
                            <div>
                                <h1 className="font-black text-lg italic tracking-tighter leading-none">{selectedType.label}</h1>
                                <p className="text-[8px] font-black uppercase opacity-60">Base HACO - Canoas</p>
                            </div>
                        </div>
                        <div className="bg-black/20 px-3 py-1.5 rounded-xl border border-white/10 text-[10px] font-black">{currentStep + 1} / {CATEGORIES.length}</div>
                    </header>

                    <nav className="bg-white border-b flex overflow-x-auto no-scrollbar sticky top-[72px] z-40 shadow-sm">
                        {CATEGORIES.map((cat, idx) => (
                            <button key={cat.id} className={`flex-1 min-w-[85px] py-4 flex flex-col items-center gap-1 border-b-4 transition-all ${idx === currentStep ? 'border-red-600 text-red-600 bg-red-50/50' : 'border-transparent text-slate-300'}`}>
                                <i data-lucide={cat.icon} className="w-4 h-4"></i>
                                <span className="text-[8px] font-black uppercase tracking-tighter">{cat.label}</span>
                            </button>
                        ))}
                    </nav>

                    <main className="max-w-md mx-auto p-5 mt-4 space-y-4">
                        {CATEGORIES[currentStep].id === 'info' && (
                            <div className="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-200 space-y-6 animate-fade-in">
                                <div className="space-y-1 text-center mb-6">
                                    <h2 className="text-xl font-black text-slate-800 uppercase tracking-tighter leading-none italic">Identificação</h2>
                                    <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Dados do Plantão</p>
                                </div>
                                <input type="text" placeholder="PLACA DA VIATURA" className="w-full p-5 rounded-2xl bg-white border-2 border-transparent focus:border-red-500 outline-none font-black text-xl text-center uppercase shadow-sm" value={formData.placa} onChange={e => setFormData({...formData, placa: e.target.value.toUpperCase()})} />
                                <input type="text" placeholder="NOME DO RESPONSÁVEL" className="w-full p-5 rounded-2xl bg-white border-2 border-transparent focus:border-red-500 outline-none font-bold text-center uppercase shadow-sm" value={formData.responsavel} onChange={e => setFormData({...formData, responsavel: e.target.value.toUpperCase()})} />
                            </div>
                        )}

                        {itemsToDisplay.map(item => (
                            <div key={item.id} className="bg-white p-6 rounded-[2.5rem] card-shadow border border-slate-100 animate-fade-in">
                                <div className="flex justify-between items-center mb-5">
                                    <span className="font-bold text-slate-800 tracking-tight pr-4 text-sm leading-tight">{item.label}</span>
                                    <div className="flex bg-slate-100 p-1 rounded-2xl shrink-0 shadow-inner">
                                        <button onClick={() => setFormData({...formData, items: {...formData.items, [item.id]: {...formData.items[item.id], status: 'C'}}})} className={`px-5 py-2.5 rounded-xl text-xs font-black transition-all ${formData.items[item.id].status === 'C' ? 'bg-green-500 text-white shadow-lg' : 'text-slate-400'}`}>C</button>
                                        <button onClick={() => setFormData({...formData, items: {...formData.items, [item.id]: {...formData.items[item.id], status: 'NC'}}})} className={`px-5 py-2.5 rounded-xl text-xs font-black transition-all ${formData.items[item.id].status === 'NC' ? 'bg-red-500 text-white shadow-lg' : 'text-slate-400'}`}>NC</button>
                                    </div>
                                </div>
                                <input type="text" placeholder="Observação se NC..." className={`w-full p-4 text-xs rounded-xl bg-slate-50 border-none outline-none focus:ring-1 ${formData.items[item.id].status === 'NC' ? 'bg-red-50 ring-red-100' : ''}`} value={formData.items[item.id].obs} onChange={e => setFormData({...formData, items: {...formData.items, [item.id]: {...formData.items[item.id], obs: e.target.value}}})} />
                            </div>
                        ))}

                        {CATEGORIES[currentStep].id === 'revisar' && (
                            <div className="bg-slate-900 text-white p-8 rounded-[3rem] space-y-6 text-center shadow-2xl animate-fade-in">
                                <i data-lucide="send" className="w-12 h-12 mx-auto text-red-500 mb-4"></i>
                                <h2 className="text-2xl font-black italic uppercase tracking-tighter leading-none">Conferência Pronta</h2>
                                <div className="bg-white/10 p-5 rounded-3xl space-y-2">
                                    <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Resumo Prontidão</p>
                                    <p className="font-bold text-sm tracking-tighter">Viatura: {formData.placa}</p>
                                    <p className="text-[9px] text-slate-400 uppercase font-black">{Object.values(formData.items).filter(v => v.status === 'NC').length} itens não conformes</p>
                                </div>
                                <button onClick={handleSubmit} disabled={loading} className="w-full bg-red-600 text-white font-black py-6 rounded-3xl shadow-xl uppercase tracking-widest text-xs active:scale-95 transition-all">
                                    {loading ? 'GRAVANDO...' : 'FINALIZAR E GRAVAR'}
                                </button>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 p-5 glass border-t border-slate-100 flex gap-4 shadow-2xl">
                        <div className="max-w-md mx-auto w-full flex gap-3">
                            {currentStep > 0 && <button onClick={() => setCurrentStep(s => s - 1)} className="flex-1 bg-white border border-slate-200 text-slate-500 font-black py-5 rounded-3xl uppercase text-[9px] tracking-widest">Anterior</button>}
                            {currentStep < CATEGORIES.length - 1 && <button onClick={() => setCurrentStep(s => s + 1)} className="flex-[2] bg-slate-900 text-white font-black py-5 rounded-3xl shadow-xl uppercase text-[9px] tracking-widest active:scale-95 transition-all">Próximo</button>}
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
