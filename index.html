<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HACO - Sala de Situação SAE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; letter-spacing: -0.01em; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .6; } }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.03); }
        .status-badge { box-shadow: 0 0 15px rgba(220, 38, 38, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzaxizVCggOIIjdUVyEz7Yk-8YemrsG5HZ9thMdl_DDzok2T120mggXfkZYj5S4PoAT/exec"; 

        const AMBULANCE_TYPES = [
            { id: 'basica', label: 'Básica', icon: 'truck', color: 'bg-blue-600' },
            { id: 'avancada', label: 'Avançada', icon: 'zap', color: 'bg-red-600' },
            { id: 'paje', label: 'PAJÉ', icon: 'shield', color: 'bg-green-600' },
            { id: 'missoes', label: 'Missões', icon: 'plane', color: 'bg-slate-600' }
        ];

        const CATEGORIES = [
            { id: 'info', label: 'Identificação', icon: 'user' },
            { id: 'Insumos', label: 'Insumos', icon: 'package' },
            { id: 'Equipamentos', label: 'Equipamentos', icon: 'stethoscope' },
            { id: 'revisar', label: 'Concluir', icon: 'check-square' }
        ];

        const MASTER_CHECKLIST = [
            { id: 'esparadrapo', label: 'Esparadrapo', cat: 'Insumos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'micropore', label: 'Micropore', cat: 'Insumos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'dea', label: 'DEA / Monitor', cat: 'Equipamentos', types: ['avancada', 'missoes'] },
            { id: 'oximetro', label: 'Oxímetro de Pulso', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'talas', label: 'Talas imobilização', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'fluxometro', label: 'Fluxômetro O2', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] }
        ];

        function App() {
            const [mode, setMode] = useState('selection');
            const [selectedType, setSelectedType] = useState(null);
            const [currentStep, setCurrentStep] = useState(0);
            const [loading, setLoading] = useState(false);
            const [submitted, setSubmitted] = useState(false);
            const [formData, setFormData] = useState({ placa: '', responsavel: '', items: {} });
            const [adminData, setAdminData] = useState([]);
            const [currentTime, setCurrentTime] = useState(new Date());

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                if (window.lucide) window.lucide.createIcons();
                return () => clearInterval(timer);
            }, [mode, currentStep, submitted, adminData]);

            // --- PROCESSAMENTO DE DADOS DE COMANDO ---
            const audit = useMemo(() => {
                if (!adminData.length) return { operacional: 0, alerts: [], shifts: {}, currentShift: '---' };

                const todayStr = currentTime.toLocaleDateString('pt-BR');
                const hour = currentTime.getHours();
                
                let shiftName = 'NOITE';
                if (hour >= 7 && hour < 13) shiftName = 'MANHÃ';
                else if (hour >= 13 && hour < 19) shiftName = 'TARDE';

                const total = adminData.length;
                const conforme = adminData.filter(d => d[5] === 'C').length;
                
                const ncItems = adminData.filter(d => d[5] === 'NC').map(d => ({
                    data: d[0], tipo: d[1], placa: d[2], resp: d[3], item: d[4], obs: d[6]
                })).reverse();

                const shifts = {};
                AMBULANCE_TYPES.forEach(t => {
                    const logsToday = adminData.filter(d => d[1] === t.label && d[0].split(',')[0].trim() === todayStr);
                    
                    const getShiftStatus = (start, end) => {
                        const log = logsToday.find(d => {
                            const h = parseInt(d[0].match(/(\d{2}):/)[1]);
                            return h >= start && h < end;
                        });
                        return log ? { ok: true, user: log[3] } : { ok: false, user: null };
                    };

                    const nightLog = logsToday.find(d => {
                        const match = d[0].match(/(\d{2}):/);
                        if (!match) return false;
                        const h = parseInt(match[1]);
                        return h >= 19 || h < 7;
                    });

                    shifts[t.label] = {
                        MANHÃ: getShiftStatus(7, 13),
                        TARDE: getShiftStatus(13, 19),
                        NOITE: nightLog ? { ok: true, user: nightLog[3] } : { ok: false, user: null }
                    };
                });

                return {
                    operacional: Math.round((conforme / total) * 100),
                    alerts: ncItems.slice(0, 6),
                    shifts,
                    currentShift: shiftName
                };
            }, [adminData, currentTime]);

            const fetchAdminData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${GOOGLE_SHEET_URL}?action=read&t=${Date.now()}`);
                    const data = await res.json();
                    setAdminData(data);
                    setMode('admin');
                } catch (e) { console.error("Sync Error"); }
                setLoading(false);
            };

            const resetToSelection = () => {
                setSubmitted(false);
                setSelectedType(null);
                setCurrentStep(0);
                setFormData({ placa: '', responsavel: '', items: {} });
                setMode('selection');
            };

            const handleTypeSelect = (type) => {
                setSelectedType(type);
                const items = {};
                MASTER_CHECKLIST.filter(i => i.types.includes(type.id)).forEach(i => {
                    items[i.id] = { status: 'C', obs: '' };
                });
                setFormData({ placa: '', responsavel: '', items });
                setMode('user');
            };

            const handleSubmit = async () => {
                setLoading(true);
                const payload = {
                    action: 'write',
                    tipo: selectedType.label,
                    placa: formData.placa,
                    responsavel: formData.responsavel,
                    items: Object.entries(formData.items).map(([id, val]) => ({
                        nome: MASTER_CHECKLIST.find(i => i.id === id).label,
                        status: val.status,
                        obs: val.obs
                    }))
                };
                try {
                    await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setSubmitted(true);
                } catch (e) { alert("Erro de rede."); }
                setLoading(false);
            };

            // --- INTERFACE ADMINISTRATIVA AVANÇADA ---
            if (mode === 'admin') {
                return (
                    <div className="min-h-screen bg-slate-950 flex flex-col lg:flex-row animate-fade-in overflow-hidden">
                        {/* Sidebar Minimalista */}
                        <aside className="lg:w-20 bg-slate-900 flex lg:flex-col items-center justify-between p-4 border-r border-white/5">
                            <div className="flex lg:flex-col gap-8 items-center">
                                <div className="w-12 h-12 bg-red-600 rounded-xl flex items-center justify-center status-badge"><i data-lucide="shield-check" className="text-white"></i></div>
                                <button className="text-red-500 bg-red-500/10 p-3 rounded-xl"><i data-lucide="layout-dashboard"></i></button>
                                <button onClick={fetchAdminData} className={`text-slate-500 p-3 ${loading ? 'animate-spin' : ''}`}><i data-lucide="refresh-cw"></i></button>
                            </div>
                            <button onClick={resetToSelection} className="text-slate-600 hover:text-white transition-colors"><i data-lucide="log-out"></i></button>
                        </aside>

                        <main className="flex-1 overflow-y-auto p-6 lg:p-10 space-y-10 custom-scrollbar">
                            <header className="flex justify-between items-start">
                                <div>
                                    <div className="flex items-center gap-2 mb-2">
                                        <span className="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span>
                                        <span className="text-[10px] font-black uppercase tracking-[0.4em] text-slate-500 italic">Live Operations Control</span>
                                    </div>
                                    <h1 className="text-6xl font-black tracking-tighter uppercase italic leading-none text-white">Prontidão <span className="text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500">HACO</span></h1>
                                    <div className="mt-4 flex gap-4 font-mono text-[10px] text-slate-500">
                                        <span>BASE: CANOAS/RS</span>
                                        <span>SISTEMA: SAE V5.0</span>
                                        <span className="text-red-500">TURNO: {audit.currentShift}</span>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="font-mono text-3xl font-black text-white">{currentTime.toLocaleTimeString('pt-BR')}</p>
                                    <p className="text-[10px] font-bold text-slate-600 uppercase tracking-widest">{currentTime.toLocaleDateString('pt-BR')}</p>
                                </div>
                            </header>

                            {/* Cartões de Viatura com Status de Profissional */}
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {AMBULANCE_TYPES.map(t => (
                                    <div key={t.id} className="glass-panel p-8 rounded-[2rem] relative group hover:ring-1 hover:ring-red-500/30 transition-all">
                                        <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-8 border-b border-white/5 pb-4">{t.label}</h4>
                                        <div className="space-y-6">
                                            {['MANHÃ', 'TARDE', 'NOITE'].map(s => {
                                                const hasData = audit.shifts[t.label][s].ok;
                                                const user = audit.shifts[t.label][s].user;
                                                return (
                                                    <div key={s} className="flex justify-between items-start">
                                                        <div>
                                                            <span className="block text-[9px] font-black text-slate-600 uppercase">{s}</span>
                                                            {hasData && <span className="text-[11px] font-bold text-white uppercase italic tracking-tighter">{user}</span>}
                                                        </div>
                                                        <div className={`mt-1 px-3 py-1 rounded-lg text-[8px] font-black border ${hasData ? 'bg-green-500/10 text-green-500 border-green-500/20' : 'bg-red-500/10 text-red-500 border-red-500/20 animate-pulse'}`}>
                                                            {hasData ? '✓ CHECK' : 'PENDENTE'}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Seção de Falhas Críticas e Operacionalidade */}
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <div className="lg:col-span-2 bg-slate-900/40 rounded-[3rem] p-10 border border-white/5 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-64 h-64 bg-red-600/5 blur-[100px] rounded-full"></div>
                                    <h3 className="text-[11px] font-black uppercase tracking-[0.4em] text-red-500 mb-8 flex items-center gap-3 italic">
                                        <i data-lucide="alert-octagon" className="w-4 h-4"></i> Critical Inventory Alerts
                                    </h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 relative z-10">
                                        {audit.alerts.length > 0 ? audit.alerts.map((a, i) => (
                                            <div key={i} className="flex items-center justify-between p-6 bg-slate-950/50 rounded-3xl border border-white/5 hover:bg-red-600/5 transition-all group">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-10 h-10 bg-red-600/10 rounded-xl flex items-center justify-center text-red-600 group-hover:bg-red-600 group-hover:text-white transition-all"><i data-lucide="activity" className="w-5 h-5"></i></div>
                                                    <div>
                                                        <p className="text-xs font-black uppercase tracking-tighter text-white leading-none">{a.item}</p>
                                                        <p className="text-[10px] font-bold text-red-500 mt-2 uppercase">{a.obs || "Material Faltante"}</p>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-[10px] font-black text-slate-300 uppercase leading-none">{a.resp}</p>
                                                    <p className="text-[8px] font-bold text-slate-600 uppercase mt-1 italic">{a.placa}</p>
                                                </div>
                                            </div>
                                        )) : <div className="col-span-2 text-center py-10 opacity-20 font-black italic uppercase tracking-widest">Frota 100% Conforme</div>}
                                    </div>
                                </div>

                                <div className="glass-panel rounded-[3rem] p-10 flex flex-col justify-center items-center text-center">
                                    <div className="relative mb-6">
                                        <svg className="w-40 h-40 transform -rotate-90">
                                            <circle cx="80" cy="80" r="70" stroke="currentColor" strokeWidth="12" fill="transparent" className="text-slate-800" />
                                            <circle cx="80" cy="80" r="70" stroke="currentColor" strokeWidth="12" fill="transparent" strokeDasharray="440" strokeDashoffset={440 - (440 * audit.operacional) / 100} className="text-red-600" strokeLinecap="round" />
                                        </svg>
                                        <div className="absolute inset-0 flex flex-col items-center justify-center">
                                            <span className="text-4xl font-black text-white italic leading-none">{audit.operacional}%</span>
                                            <span className="text-[8px] font-black text-slate-500 uppercase tracking-widest mt-1">Status Global</span>
                                        </div>
                                    </div>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] leading-relaxed max-w-[150px]">Nível de Prontidão da Frota HACO</p>
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            // --- FLUXO DE USUÁRIO (MOBILE) ---
            if (submitted) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-8 text-center bg-slate-950 animate-fade-in">
                        <div className="w-24 h-24 bg-red-600 rounded-full flex items-center justify-center mb-10 shadow-2xl animate-bounce shadow-red-600/30">
                            <i data-lucide="check" className="text-white w-12 h-12"></i>
                        </div>
                        <h1 className="text-4xl font-black mb-4 uppercase italic tracking-tighter text-white">Transmissão OK</h1>
                        <p className="text-slate-500 mb-12 font-bold text-[10px] uppercase tracking-widest leading-loose">Dados processados pelo Comando de Enfermagem.</p>
                        <button onClick={resetToSelection} className="w-full max-w-xs bg-white text-slate-900 font-black py-7 rounded-[2rem] shadow-2xl uppercase tracking-[0.2em] text-[11px] active:scale-95 transition-all">Nova Verificação</button>
                    </div>
                );
            }

            if (mode === 'selection') {
                return (
                    <div className="min-h-screen p-8 flex flex-col justify-center animate-fade-in bg-slate-950">
                        <div className="max-w-md mx-auto w-full space-y-12">
                            <div className="text-center space-y-4">
                                <div className="bg-red-600 w-24 h-24 rounded-[2.5rem] flex items-center justify-center mx-auto shadow-2xl shadow-red-600/20 mb-8"><i data-lucide="cross" className="text-white w-12 h-12"></i></div>
                                <h1 className="text-5xl font-black tracking-tighter text-white italic uppercase leading-none">HACO <span className="text-red-600">OPS</span></h1>
                                <p className="text-slate-500 font-bold uppercase text-[9px] tracking-[0.4em] italic leading-none">Controle de Prontidão Tática</p>
                            </div>
                            <div className="grid grid-cols-2 gap-6">
                                {AMBULANCE_TYPES.map(t => (
                                    <button key={t.id} onClick={() => handleTypeSelect(t)} className="bg-slate-900/50 p-8 rounded-[3.5rem] border border-white/5 flex flex-col items-center gap-6 active:scale-95 transition-all hover:border-red-600 group">
                                        <div className={`${t.color} p-6 rounded-3xl text-white shadow-xl group-hover:scale-110 transition-transform`}><i data-lucide={t.icon} className="w-8 h-8"></i></div>
                                        <span className="font-black text-slate-400 uppercase text-[10px] tracking-widest group-hover:text-white transition-colors">{t.label}</span>
                                    </button>
                                ))}
                            </div>
                            <button onClick={fetchAdminData} className="w-full py-6 text-slate-600 font-black text-[9px] uppercase tracking-widest hover:text-white transition-colors italic border-t border-white/5 pt-10">Painel Administrativo SAE</button>
                        </div>
                    </div>
                );
            }

            const items = MASTER_CHECKLIST.filter(i => i.types.includes(selectedType?.id) && i.cat === CATEGORIES[currentStep].id);

            return (
                <div className="min-h-screen pb-44 animate-fade-in bg-slate-950">
                    <header className={`sticky top-0 z-50 ${selectedType?.color} text-white p-8 shadow-2xl flex justify-between items-center rounded-b-[3.5rem]`}>
                        <div className="flex items-center gap-5">
                            <button onClick={resetToSelection} className="bg-white/20 p-3 rounded-2xl border border-white/10"><i data-lucide="chevron-left" className="w-6 h-6"></i></button>
                            <div>
                                <h1 className="font-black text-2xl italic tracking-tighter leading-none uppercase">{selectedType?.label}</h1>
                                <p className="text-[10px] font-black uppercase opacity-60 tracking-widest mt-1 italic">HACO - Canoas/RS</p>
                            </div>
                        </div>
                        <div className="bg-black/20 px-4 py-2 rounded-2xl border border-white/10 font-mono text-xs font-black">{currentStep + 1} / {CATEGORIES.length}</div>
                    </header>

                    <nav className="flex overflow-x-auto no-scrollbar sticky top-[110px] z-40 px-6 py-4 bg-slate-950/80 backdrop-blur-xl border-b border-white/5">
                        {CATEGORIES.map((cat, idx) => (
                            <button key={cat.id} className={`flex-1 min-w-[105px] py-4 flex flex-col items-center gap-1 border-b-4 transition-all ${idx === currentStep ? 'border-red-600 text-red-600' : 'border-transparent text-slate-600'}`}>
                                <i data-lucide={cat.icon} className="w-4 h-4"></i>
                                <span className="text-[9px] font-black uppercase tracking-tighter">{cat.label}</span>
                            </button>
                        ))}
                    </nav>

                    <main className="max-w-md mx-auto p-6 space-y-6 pt-12">
                        {CATEGORIES[currentStep].id === 'info' && (
                            <div className="bg-slate-900 p-12 rounded-[4rem] border border-white/5 space-y-10 shadow-2xl">
                                <div className="text-center">
                                    <h2 className="text-3xl font-black text-white uppercase tracking-tighter italic">Identificação</h2>
                                    <p className="text-[9px] font-black text-slate-500 uppercase tracking-[0.4em] mt-2 italic">Procedimento SAE HACO</p>
                                </div>
                                <div className="space-y-6">
                                    <input type="text" placeholder="VIATURA / PLACA" className="w-full p-8 rounded-[2.5rem] bg-black/20 border-2 border-transparent focus:border-red-600 outline-none font-black text-4xl text-center uppercase text-white shadow-inner transition-all" value={formData.placa} onChange={e => setFormData({...formData, placa: e.target.value.toUpperCase()})} />
                                    <input type="text" placeholder="NOME DO OFICIAL" className="w-full p-8 rounded-[2.5rem] bg-black/20 border-2 border-transparent focus:border-red-600 outline-none font-bold text-center uppercase text-white text-sm transition-all" value={formData.responsavel} onChange={e => setFormData({...formData, responsavel: e.target.value.toUpperCase()})} />
                                </div>
                            </div>
                        )}

                        {items.map(item => (
                            <div key={item.id} className="bg-slate-900 p-8 rounded-[3.5rem] border border-white/5 shadow-2xl animate-fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <span className="font-black text-white text-lg uppercase italic leading-tight pr-4">{item.label}</span>
                                    <div className="flex bg-black/40 p-2 rounded-2xl shadow-inner border border-white/5">
                                        <button onClick={() => setFormData({...formData, items: {...formData.items, [item.id]: {...formData.items[item.id], status: 'C'}}})} className={`px-8 py-4 rounded-xl text-xs font-black transition-all ${formData.items[item.id].status === 'C' ? 'bg-green-600 text-white shadow-xl scale-110' : 'text-slate-600'}`}>C</button>
                                        <button onClick={() => setFormData({...formData, items: {...formData.items, [item.id]: {...formData.items[item.id], status: 'NC'}}})} className={`px-8 py-4 rounded-xl text-xs font-black transition-all ${formData.items[item.id].status === 'NC' ? 'bg-red-600 text-white shadow-xl scale-110' : 'text-slate-600'}`}>NC</button>
                                    </div>
                                </div>
                                <input type="text" placeholder="Adicionar observação técnica..." className={`w-full p-6 text-xs rounded-3xl bg-black/20 border-none outline-none focus:ring-4 focus:ring-red-600/10 transition-all text-slate-400 ${formData.items[item.id].status === 'NC' ? 'bg-red-950/20 text-red-500 italic font-bold' : ''}`} value={formData.items[item.id].obs} onChange={e => setFormData({...formData, items: {...formData.items, [item.id]: {...formData.items[item.id], obs: e.target.value}}})} />
                            </div>
                        ))}

                        {CATEGORIES[currentStep].id === 'revisar' && (
                            <div className="bg-red-600 text-white p-12 rounded-[4.5rem] text-center shadow-[0_30px_60px_-15px_rgba(220,38,38,0.4)] space-y-10">
                                <div className="w-24 h-24 bg-white/10 rounded-full flex items-center justify-center mx-auto border border-white/20"><i data-lucide="send" className="w-12 h-12"></i></div>
                                <h2 className="text-4xl font-black italic uppercase leading-none tracking-tighter italic">Finalizar<br/>Transmissão</h2>
                                <button onClick={handleSubmit} disabled={loading} className="w-full bg-slate-950 text-white font-black py-9 rounded-[3rem] shadow-2xl uppercase tracking-[0.4em] text-[11px] active:scale-95 transition-all italic">
                                    {loading ? 'SINCRONIZANDO...' : 'EXECUTAR GRAVAÇÃO'}
                                </button>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 p-8 bg-slate-950/90 backdrop-blur-2xl border-t border-white/5 flex gap-6 z-50 rounded-t-[4rem] shadow-2xl">
                        <div className="max-w-md mx-auto w-full flex gap-6">
                            {currentStep > 0 && <button onClick={() => setCurrentStep(s => s - 1)} className="flex-1 bg-white/5 border-2 border-white/10 text-slate-500 font-black py-7 rounded-[2.5rem] uppercase text-[10px] tracking-widest italic transition-all">Anterior</button>}
                            {currentStep < CATEGORIES.length - 1 && <button onClick={() => setCurrentStep(s => s + 1)} className="flex-[2] bg-slate-900 text-white font-black py-7 rounded-[2.5rem] shadow-2xl uppercase text-[10px] tracking-widest italic active:scale-95 border border-white/10">Próximo</button>}
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
