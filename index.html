<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HACO - OPS CENTER SAE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .neon-red { box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); border-color: #ef4444 !important; }
        .neon-green { box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); border-color: #10b981 !important; }
        input:focus { border-color: #ef4444 !important; outline: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const API_URL = "https://script.google.com/macros/s/AKfycbzaxizVCggOIIjdUVyEz7Yk-8YemrsG5HZ9thMdl_DDzok2T120mggXfkZYj5S4PoAT/exec"; 

        const VIATURAS = [
            { id: 'basica', label: 'Básica (USB)', color: 'blue' },
            { id: 'avancada', label: 'Avançada (USA)', color: 'rose' },
            { id: 'paje', label: 'PAJÉ (Tático)', color: 'emerald' },
            { id: 'missoes', label: 'Missões (EVAM)', color: 'amber' }
        ];

        const CHECKLIST_SAMU = [
            // EQUIPAMENTOS CRÍTICOS
            { id: 'dea', n: 'DEA (Desfibrilador)', cat: 'Equipamentos', types: ['basica', 'paje'] },
            { id: 'monitor', n: 'Monitor Multiparâmetros', cat: 'Equipamentos', types: ['avancada', 'missoes'] },
            { id: 'vent', n: 'Ventilador Mecânico', cat: 'Equipamentos', types: ['avancada', 'missoes'] },
            { id: 'ox', n: 'Cilindro O2 / Fluxômetro', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'oximetro', n: 'Oxímetro de Pulso', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            
            // VIAS AÉREAS
            { id: 'laringo', n: 'Laringoscópio Completo', cat: 'Vias Aéreas', types: ['avancada', 'missoes'] },
            { id: 'ambu', n: 'AMBU c/ Reservatório', cat: 'Vias Aéreas', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'tubos', n: 'Tubos / Guia / Cânulas', cat: 'Vias Aéreas', types: ['avancada', 'missoes'] },
            { id: 'aspirador', n: 'Aspirador de Secreção', cat: 'Vias Aéreas', types: ['basica', 'avancada', 'paje', 'missoes'] },

            // INSUMOS
            { id: 'acesso', n: 'Kit Acesso Venoso', cat: 'Insumos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'soro', n: 'Soros (FIS/RINGER)', cat: 'Insumos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'medic', n: 'Maleta Medicamentos', cat: 'Insumos', types: ['avancada', 'missoes'] }
        ];

        const CATEGORIES = ["Militar", "Equipamentos", "Vias Aéreas", "Insumos", "Finalizar"];

        function App() {
            const [view, setView] = useState('menu'); // menu, form, admin
            const [vSel, setVSel] = useState(null);
            const [step, setStep] = useState(0);
            const [db, setDb] = useState([]);
            const [form, setForm] = useState({ placa: '', posto: '', guerra: '', items: {} });
            const [loading, setLoading] = useState(false);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [view, step, db]);

            // --- LÓGICA DE AUDITORIA ---
            const audit = useMemo(() => {
                if (!db.length) return { op: 0, shifts: {}, alerts: [], history: [] };
                const today = new Date().toLocaleDateString('pt-BR');
                const conforme = db.filter(d => d[5] === 'C').length;
                const nc = db.filter(d => d[5] === 'NC').map(d => ({ ts: d[0], v: d[1], p: d[2], r: d[3], i: d[4], o: d[6] })).reverse();
                
                const shifts = {};
                VIATURAS.forEach(v => {
                    const logs = db.filter(d => d[1] === v.label && d[0].includes(today));
                    const check = (s, e) => {
                        const l = logs.find(d => { 
                            const match = d[0].match(/(\d{2}):/);
                            const h = match ? parseInt(match[1]) : -1;
                            return h >= s && h < e;
                        });
                        return l ? { ok: true, u: l[3] } : { ok: false };
                    };
                    shifts[v.label] = { M: check(7, 13), T: check(13, 19), N: check(19, 24) || check(0, 7) };
                });
                return { op: Math.round((conforme / db.length) * 100), shifts, alerts: nc.slice(0, 10), history: [...db].reverse() };
            }, [db]);

            // --- AÇÕES ---
            const startCheck = (v) => {
                const items = {};
                CHECKLIST_SAMU.filter(i => i.types.includes(v.id)).forEach(i => items[i.id] = { status: 'C', obs: '' });
                setForm({ placa: '', posto: '', guerra: '', items });
                setVSel(v);
                setStep(0);
                setView('form');
            };

            const send = async () => {
                if(!form.placa || !form.posto || !form.guerra) return alert("ERRO: Identificação Militar incompleta.");
                setLoading(true);
                const payload = {
                    action: 'write', tipo: vSel.label, placa: form.placa, resp: `${form.posto} ${form.guerra}`,
                    items: Object.entries(form.items).map(([id, val]) => ({ nome: CHECKLIST_SAMU.find(i => i.id === id).n, status: val.status, obs: val.obs }))
                };
                try {
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    alert("GRAVAÇÃO CONCLUÍDA!");
                    setView('menu');
                } catch (e) { alert("Erro de Rede."); }
                setLoading(false);
            };

            const sync = async () => {
                setLoading(true);
                try {
                    const r = await fetch(`${API_URL}?action=read&t=${Date.now()}`);
                    setDb(await r.json());
                    setView('admin');
                } catch (e) { alert("Falha ao sincronizar."); }
                setLoading(false);
            };

            // --- VIEW: MENU INICIAL ---
            if (view === 'menu') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 space-y-8 animate-fade">
                    <div className="text-center space-y-2">
                        <div className="bg-red-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto shadow-2xl mb-4"><i data-lucide="cross" className="text-white w-8 h-8"></i></div>
                        <h1 className="text-5xl font-black italic uppercase">HACO <span className="text-red-600">SAE</span></h1>
                        <p className="text-slate-500 font-bold uppercase tracking-[0.3em] text-[10px]">Coleta de Dados SAMU</p>
                    </div>
                    <div className="grid grid-cols-1 gap-4 w-full max-w-sm">
                        {VIATURAS.map(v => (
                            <button key={v.id} onClick={() => startCheck(v)} className="glass p-6 rounded-3xl flex items-center gap-6 active:scale-95 transition-all border-l-8 border-rose-600">
                                <div className="bg-slate-800 p-4 rounded-xl"><i data-lucide="truck" className="text-white"></i></div>
                                <span className="font-black text-white uppercase text-sm tracking-widest">{v.label}</span>
                            </button>
                        ))}
                    </div>
                    <button onClick={sync} className="text-slate-600 font-black uppercase text-[10px] tracking-widest pt-10 border-t border-white/5 w-full max-w-xs italic">Acesso Gestor (Desktop)</button>
                </div>
            );

            // --- VIEW: FORMULÁRIO MOBILE ---
            if (view === 'form') {
                const currentCat = CATEGORIES[step];
                const items = CHECKLIST_SAMU.filter(i => i.types.includes(vSel.id) && i.cat === currentCat);

                return (
                    <div className="min-h-screen flex flex-col bg-slate-950 pb-32">
                        <header className="p-6 glass flex justify-between items-center sticky top-0 z-50 rounded-b-3xl">
                            <button onClick={() => setView('menu')} className="bg-white/10 p-2 rounded-lg"><i data-lucide="chevron-left"></i></button>
                            <h1 className="font-black uppercase italic text-sm tracking-widest">{vSel.label}</h1>
                            <span className="font-mono text-xs font-black bg-red-600 px-2 py-1 rounded">{step + 1}/{CATEGORIES.length}</span>
                        </header>

                        <main className="p-4 space-y-6 flex-1 overflow-y-auto animate-fade">
                            <h2 className="text-2xl font-black uppercase text-red-500 italic px-2">{currentCat}</h2>
                            
                            {currentCat === 'Militar' && (
                                <div className="space-y-4 glass p-6 rounded-[2rem]">
                                    <input type="text" placeholder="PLACA" className="w-full p-5 bg-black/40 border border-white/10 rounded-2xl font-black text-center text-2xl uppercase" value={form.placa} onChange={e => setForm({...form, placa: e.target.value.toUpperCase()})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="text" placeholder="POSTO" className="w-full p-4 bg-black/40 border border-white/10 rounded-2xl font-bold text-center uppercase" value={form.posto} onChange={e => setForm({...form, posto: e.target.value.toUpperCase()})} />
                                        <input type="text" placeholder="GUERRA" className="w-full p-4 bg-black/40 border border-white/10 rounded-2xl font-bold text-center uppercase" value={form.guerra} onChange={e => setForm({...form, guerra: e.target.value.toUpperCase()})} />
                                    </div>
                                </div>
                            )}

                            {items.map(i => (
                                <div key={i.id} className="glass p-5 rounded-[2rem] space-y-4">
                                    <div className="flex justify-between items-center">
                                        <span className="font-black text-sm uppercase tracking-tight max-w-[60%]">{i.n}</span>
                                        <div className="flex bg-black/40 p-1 rounded-xl border border-white/5">
                                            <button onClick={() => setForm({...form, items: {...form.items, [i.id]: {status: 'C', obs: form.items[i.id].obs}}})} className={`px-4 py-2 rounded-lg font-black text-xs transition-all ${form.items[i.id].status === 'C' ? 'bg-emerald-600 text-white' : 'text-slate-600'}`}>C</button>
                                            <button onClick={() => setForm({...form, items: {...form.items, [i.id]: {status: 'NC', obs: form.items[i.id].obs}}})} className={`px-4 py-2 rounded-lg font-black text-xs transition-all ${form.items[i.id].status === 'NC' ? 'bg-red-600 text-white' : 'text-slate-600'}`}>NC</button>
                                        </div>
                                    </div>
                                    <input type="text" placeholder="Obs..." className={`w-full p-3 bg-black/20 rounded-xl text-xs ${form.items[i.id].status === 'NC' ? 'border border-red-500/50' : 'border-transparent'}`} value={form.items[i.id].obs} onChange={e => setForm({...form, items: {...form.items, [i.id]: {...form.items[i.id], obs: e.target.value}}})} />
                                </div>
                            ))}

                            {currentCat === 'Finalizar' && (
                                <div className="text-center space-y-6 glass p-8 rounded-[3rem]">
                                    <div className="bg-red-600 w-20 h-20 rounded-full flex items-center justify-center mx-auto animate-pulse"><i data-lucide="send" className="text-white"></i></div>
                                    <h3 className="font-black uppercase text-xl">Concluir Protocolo</h3>
                                    <button onClick={send} disabled={loading} className="w-full bg-white text-black font-black py-6 rounded-2xl shadow-2xl active:scale-95 transition-all">
                                        {loading ? 'ENVIANDO...' : 'EXECUTAR GRAVAÇÃO'}
                                    </button>
                                </div>
                            )}
                        </main>

                        <footer className="fixed bottom-0 left-0 right-0 p-6 glass border-t border-white/5 flex gap-4 bg-slate-950/90">
                            {step > 0 && <button onClick={() => setStep(step - 1)} className="flex-1 bg-white/5 p-5 rounded-2xl font-black uppercase text-xs">Voltar</button>}
                            {step < CATEGORIES.length - 1 && <button onClick={() => setStep(step + 1)} className="flex-[2] bg-red-600 p-5 rounded-2xl font-black uppercase text-xs shadow-lg">Próximo</button>}
                        </footer>
                    </div>
                );
            }

            // --- VIEW: DASHBOARD DESKTOP/TV ---
            if (view === 'admin') return (
                <div className="min-h-screen flex animate-fade">
                    <aside className="w-20 bg-slate-900 border-r border-white/5 flex flex-col items-center py-10 gap-8">
                        <div className="bg-red-600 p-3 rounded-xl shadow-lg"><i data-lucide="shield-check" className="text-white w-6 h-6"></i></div>
                        <button onClick={sync} className="p-4 text-slate-500 hover:text-white transition-all"><i data-lucide="refresh-cw" className={loading ? 'animate-spin' : ''}></i></button>
                        <button onClick={() => setView('menu')} className="mt-auto p-4 text-slate-700 hover:text-red-500 transition-all"><i data-lucide="log-out"></i></button>
                    </aside>

                    <main className="flex-1 p-10 overflow-y-auto space-y-12 bg-[#020617]">
                        <header className="flex justify-between items-end border-b border-white/5 pb-8">
                            <div>
                                <h1 className="text-7xl font-black tracking-tighter uppercase italic leading-none">STATUS <span className="text-red-600">SAE</span></h1>
                                <p className="text-slate-500 font-mono text-[10px] uppercase mt-4 tracking-[0.5em]">OPS CENTER - HOSPITAL DE AERONÁUTICA DE CANOAS</p>
                            </div>
                            <div className="glass p-10 rounded-[3rem] text-center min-w-[220px] neon-green">
                                <span className="text-8xl font-black text-emerald-400 font-mono leading-none">{audit.op}%</span>
                                <p className="text-[10px] font-black text-slate-500 mt-4 tracking-widest uppercase italic">Conformidade Frota</p>
                            </div>
                        </header>

                        <div className="grid grid-cols-4 gap-6">
                            {VIATURAS.map(v => (
                                <div key={v.id} className="glass p-8 rounded-[2.5rem] relative overflow-hidden">
                                    <div className={`absolute top-0 left-0 w-full h-1.5 bg-${v.color}-500 shadow-xl`}></div>
                                    <h4 className="text-[10px] font-black text-white uppercase tracking-widest mb-10 border-b border-white/5 pb-4 italic">{v.label}</h4>
                                    <div className="space-y-8">
                                        {['MANHÃ', 'TARDE', 'NOITE'].map(s => {
                                            const log = audit.shifts[v.label][s[0]];
                                            return (
                                                <div key={s} className="flex justify-between items-start">
                                                    <div>
                                                        <span className="block text-[9px] font-black text-slate-600 uppercase mb-1">{s}</span>
                                                        {log?.ok && <span className="text-[11px] font-bold text-white uppercase italic underline decoration-red-600">{log.u}</span>}
                                                    </div>
                                                    <span className={`px-3 py-1 rounded text-[9px] font-black border ${log?.ok ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-red-500/10 text-red-500 border-red-500/20 animate-pulse'}`}>{log?.ok ? 'OK' : 'PEND'}</span>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="grid grid-cols-3 gap-8">
                            <div className="col-span-2 glass p-10 rounded-[3.5rem] neon-red">
                                <h3 className="text-[11px] font-black uppercase text-red-500 tracking-[0.5em] mb-10 flex items-center gap-4 italic"><i data-lucide="alert-octagon" className="animate-pulse"></i> ALERTAS DE FALHA EM EQUIPAMENTOS</h3>
                                <div className="grid grid-cols-1 gap-4">
                                    {audit.alerts.map((a, i) => (
                                        <div key={i} className="flex justify-between items-center p-6 bg-slate-950/50 rounded-2xl border border-white/5">
                                            <div className="flex items-center gap-6 italic uppercase">
                                                <div className="bg-red-600/20 text-red-500 p-4 rounded-xl"><i data-lucide="activity"></i></div>
                                                <div><p className="text-lg font-black leading-none">{a.i}</p><p className="text-xs text-red-500 mt-2">{a.o || "Material Faltante / Inoperante"}</p></div>
                                            </div>
                                            <div className="text-right font-mono"><p className="text-xs font-black text-slate-400">{a.r}</p><p className="text-[10px] text-slate-600 mt-1">{a.p}</p></div>
                                        </div>
                                    ))}
                                    {audit.alerts.length === 0 && <div className="text-center py-10 opacity-20 font-black uppercase tracking-[0.5em]">100% OPERACIONAL</div>}
                                </div>
                            </div>
                            
                            <div className="glass p-10 rounded-[3.5rem] overflow-hidden">
                                <h3 className="text-[11px] font-black uppercase text-slate-500 tracking-[0.5em] mb-10 italic">ÚLTIMOS CHECKS</h3>
                                <div className="space-y-6 overflow-y-auto max-h-[500px] no-scrollbar">
                                    {audit.history.slice(0, 10).map((h, i) => (
                                        <div key={i} className="border-l-2 border-white/10 pl-6 space-y-1">
                                            <p className="text-[10px] font-mono text-slate-600">{h[0]}</p>
                                            <p className="text-[11px] font-black uppercase">{h[3]}</p>
                                            <p className="text-[9px] font-bold text-red-500 italic">{h[1]} - {h[2]}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
