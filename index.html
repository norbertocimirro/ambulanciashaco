<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HACO - Gestão de Equipamentos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0f4f8; color: #1e293b; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .colorful-card { transition: all 0.3s ease; border: 1px solid rgba(255, 255, 255, 0.8); }
        .colorful-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ⚠️ ATENÇÃO: COLOQUE SUA URL /EXEC AQUI
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzaxizVCggOIIjdUVyEz7Yk-8YemrsG5HZ9thMdl_DDzok2T120mggXfkZYj5S4PoAT/exec"; 

        const AMBULANCE_TYPES = [
            { id: 'basica', label: 'Básica', color: 'bg-blue-500', text: 'text-blue-600', light: 'bg-blue-50', border: 'border-blue-100' },
            { id: 'avancada', label: 'Avançada', color: 'bg-rose-500', text: 'text-rose-600', light: 'bg-rose-50', border: 'border-rose-100' },
            { id: 'paje', label: 'PAJÉ', color: 'bg-emerald-500', text: 'text-emerald-600', light: 'bg-emerald-50', border: 'border-emerald-100' },
            { id: 'missoes', label: 'Missões', color: 'bg-amber-500', text: 'text-amber-600', light: 'bg-amber-50', border: 'border-amber-100' }
        ];

        const CATEGORIES = [
            { id: 'info', label: 'Identificação', icon: 'shield' },
            { id: 'Insumos', label: 'Materiais Médicos', icon: 'package' },
            { id: 'Equipamentos', label: 'Equipamentos APH', icon: 'stethoscope' },
            { id: 'revisar', label: 'Finalizar', icon: 'check-circle' }
        ];

        const MASTER_CHECKLIST = [
            { id: 'esparadrapo', label: 'Esparadrapo', cat: 'Insumos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'dea', label: 'DEA / Monitor Cardíaco', cat: 'Equipamentos', types: ['avancada', 'missoes'] },
            { id: 'oximetro', label: 'Oxímetro de Pulso', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'talas', label: 'Talas imobilização', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'fluxometro', label: 'Fluxômetro O2', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] }
        ];

        function App() {
            const [mode, setMode] = useState('selection');
            const [selectedType, setSelectedType] = useState(null);
            const [currentStep, setCurrentStep] = useState(0);
            const [loading, setLoading] = useState(false);
            const [submitted, setSubmitted] = useState(false);
            const [formData, setFormData] = useState({ placa: '', posto: '', nomeGuerra: '', items: {} });
            const [adminData, setAdminData] = useState([]);
            const [loginData, setLoginData] = useState({ pass: '' });

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [mode, currentStep, submitted, adminData]);

            // --- LÓGICA DE AUDITORIA SAE ---
            const audit = useMemo(() => {
                if (!adminData.length) return { operacional: 0, alerts: [], shifts: {} };
                const today = new Date().toLocaleDateString('pt-BR');
                const conforme = adminData.filter(d => d[5] === 'C').length;
                const ncItems = adminData.filter(d => d[5] === 'NC').map(d => ({
                    data: d[0], tipo: d[1], placa: d[2], resp: d[3], item: d[4], obs: d[6]
                })).reverse();

                const shifts = {};
                AMBULANCE_TYPES.forEach(t => {
                    const logsToday = adminData.filter(d => d[1] === t.label && d[0].includes(today));
                    const getShiftData = (start, end) => {
                        const log = logsToday.find(d => {
                            const match = d[0].match(/(\d{2}):/);
                            if (!match) return false;
                            const h = parseInt(match[1]);
                            return h >= start && h < end;
                        });
                        return log ? { ok: true, resp: log[3] } : { ok: false };
                    };
                    shifts[t.label] = {
                        MANHÃ: getShiftData(7, 13), TARDE: getShiftData(13, 19),
                        NOITE: logsToday.find(d => {
                            const h = parseInt(d[0].match(/(\d{2}):/)[1]);
                            return h >= 19 || h < 7;
                        }) ? { ok: true, resp: logsToday.find(d => { const h = parseInt(d[0].match(/(\d{2}):/)[1]); return h >= 19 || h < 7; })[3] } : { ok: false }
                    };
                });
                return { operacional: Math.round((conforme / adminData.length) * 100), alerts: ncItems.slice(0, 6), shifts };
            }, [adminData]);

            const fetchData = async () => {
                if (GOOGLE_SHEET_URL.includes("SUA_URL")) return alert("Erro: Configure a URL do script no código!");
                setLoading(true);
                try {
                    const res = await fetch(`${GOOGLE_SHEET_URL}?action=read&t=${Date.now()}`);
                    const data = await res.json();
                    setAdminData(data);
                    setMode('admin');
                } catch (e) { alert("Erro ao carregar dados. Verifique a URL do Google Script."); }
                setLoading(false);
            };

            const resetApp = () => {
                setSubmitted(false); setSelectedType(null); setCurrentStep(0);
                setFormData({ placa: '', posto: '', nomeGuerra: '', items: {} });
                setMode('selection');
            };

            const handleTypeSelect = (type) => {
                setSelectedType(type);
                const items = {};
                MASTER_CHECKLIST.filter(i => i.types.includes(type.id)).forEach(i => { items[id] = { status: 'C', obs: '' }; });
                setFormData({ ...formData, items });
                setMode('user');
            };

            const handleSubmit = async () => {
                setLoading(true);
                const payload = {
                    action: 'write', tipo: selectedType.label, placa: formData.placa,
                    responsavel: `${formData.posto} ${formData.nomeGuerra}`,
                    items: Object.entries(formData.items).map(([id, val]) => ({ nome: MASTER_CHECKLIST.find(i => i.id === id).label, status: val.status, obs: val.obs }))
                };
                try {
                    await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setSubmitted(true);
                } catch (e) { alert("Erro ao salvar."); }
                setLoading(false);
            };

            // --- VIEW: DASHBOARD COLORIDO (LIGHT) ---
            if (mode === 'admin') {
                return (
                    <div className="min-h-screen flex flex-col lg:flex-row animate-fade-in bg-white">
                        <aside className="lg:w-72 bg-slate-50 p-8 border-r border-slate-100 flex flex-col justify-between">
                            <div className="space-y-10">
                                <div className="flex items-center gap-4">
                                    <div className="bg-red-500 p-3 rounded-2xl text-white shadow-lg shadow-red-200"><i data-lucide="shield-check"></i></div>
                                    <div>
                                        <h2 className="font-black text-[10px] uppercase text-red-500 tracking-widest leading-none">Gestão SAE</h2>
                                        <p className="font-extrabold text-lg text-slate-800 tracking-tighter">HACO Ops</p>
                                    </div>
                                </div>
                                <nav className="space-y-2">
                                    <button className="w-full flex items-center gap-3 p-4 bg-white text-red-600 rounded-2xl font-black text-xs uppercase shadow-sm border border-red-100"><i data-lucide="layout-dashboard"></i> Monitor Global</button>
                                    <button onClick={fetchData} className="w-full flex items-center gap-3 p-4 text-slate-400 hover:bg-white rounded-2xl font-black text-xs uppercase transition-all"><i data-lucide="refresh-cw" className={loading ? 'animate-spin' : ''}></i> Sincronizar</button>
                                </nav>
                            </div>
                            <button onClick={resetApp} className="p-4 text-slate-300 font-black text-[10px] uppercase hover:text-red-500">Voltar ao Início</button>
                        </aside>

                        <main className="flex-1 p-6 lg:p-12 space-y-10 overflow-y-auto">
                            <header className="flex justify-between items-center bg-gradient-to-r from-slate-50 to-transparent p-8 rounded-[3rem]">
                                <div>
                                    <h1 className="text-5xl font-black text-slate-900 tracking-tighter uppercase italic leading-none">Prontidão de<br/><span className="text-red-500">Equipamentos</span></h1>
                                    <p className="text-slate-400 font-bold text-[10px] uppercase tracking-[0.4em] mt-4">Auditoria em Tempo Real - Canoas/RS</p>
                                </div>
                                <div className="bg-white p-8 rounded-[3rem] shadow-xl border border-slate-50 text-center ring-8 ring-slate-50">
                                    <span className="text-5xl font-black text-emerald-500 italic">{audit.operacional}%</span>
                                    <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest mt-2 italic">Status Frota</p>
                                </div>
                            </header>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {AMBULANCE_TYPES.map(t => (
                                    <div key={t.id} className={`bg-white p-8 rounded-[3rem] shadow-sm border-t-[12px] ${t.border} colorful-card`}>
                                        <h4 className={`text-[11px] font-black ${t.text} uppercase tracking-widest mb-8 border-b pb-4`}>{t.label}</h4>
                                        <div className="space-y-6">
                                            {['MANHÃ', 'TARDE', 'NOITE'].map(s => (
                                                <div key={s} className="space-y-1">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-[9px] font-black text-slate-300 uppercase italic">{s}</span>
                                                        <span className={`px-3 py-1 rounded-full text-[8px] font-black uppercase ${audit.shifts[t.label][s].ok ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-50 text-rose-500 animate-pulse'}`}>
                                                            {audit.shifts[t.label][s].ok ? '✓ OK' : 'PENDENTE'}
                                                        </span>
                                                    </div>
                                                    {audit.shifts[t.label][s].ok && <p className="text-[10px] font-extrabold text-slate-600 uppercase italic">{audit.shifts[t.label][s].resp}</p>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="bg-white rounded-[4rem] p-10 shadow-sm border border-slate-100 relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-red-500/5 blur-3xl"></div>
                                <h3 className="text-[11px] font-black uppercase text-red-500 tracking-[0.4em] mb-10 flex items-center gap-3 italic"><i data-lucide="alert-octagon" className="w-5 h-5"></i> Alertas Críticos de Equipamentos</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {audit.alerts.map((a, i) => (
                                        <div key={i} className="flex justify-between items-center p-6 bg-slate-50 rounded-[2.5rem] border border-slate-100 hover:border-red-500 transition-all group">
                                            <div className="flex items-center gap-5">
                                                <div className="bg-red-500 text-white p-4 rounded-3xl shadow-lg shadow-red-200"><i data-lucide="stethoscope" className="w-5 h-5"></i></div>
                                                <div>
                                                    <p className="text-sm font-black uppercase italic leading-none text-slate-800">{a.item}</p>
                                                    <p className="text-[10px] font-bold text-red-500 uppercase mt-2">{a.obs || "Faltante / Inoperante"}</p>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <span className="block text-[11px] font-black text-slate-900 uppercase italic leading-none">{a.resp}</span>
                                                <span className="text-[9px] font-bold text-slate-400 uppercase mt-2 leading-none">{a.placa}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            // --- VIEW: LOGIN ---
            if (mode === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50 animate-fade-in">
                        <div className="w-full max-w-sm bg-white p-12 rounded-[4rem] shadow-2xl text-center border border-white">
                            <div className="bg-red-500 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-8 text-white shadow-xl shadow-red-200"><i data-lucide="lock" className="w-8 h-8"></i></div>
                            <h2 className="text-3xl font-black uppercase tracking-tighter text-slate-900 italic leading-none">Acesso<br/>Gestor</h2>
                            <div className="space-y-4 my-10">
                                <input type="password" placeholder="SENHA DE ACESSO" className="w-full p-6 bg-slate-50 rounded-[2rem] outline-none font-black text-center text-sm border-2 border-transparent focus:border-red-500 transition-all uppercase" value={loginData.pass} onChange={e => setLoginData({...loginData, pass: e.target.value})} />
                            </div>
                            <button onClick={() => loginData.pass === 'sdenf2026' ? fetchData() : alert("Acesso negado.")} className="w-full bg-slate-900 text-white font-black py-7 rounded-[2.5rem] shadow-xl uppercase tracking-widest text-[11px] active:scale-95 transition-all italic">Entrar no Comando</button>
                            <button onClick={resetApp} className="mt-8 text-slate-400 font-bold text-[10px] uppercase tracking-widest italic">Voltar</button>
                        </div>
                    </div>
                );
            }

            // --- VIEW: SELEÇÃO ---
            if (mode === 'selection') {
                return (
                    <div className="min-h-screen flex flex-col justify-center items-center p-8 bg-slate-50">
                        <div className="text-center max-w-md w-full space-y-12">
                            <div className="space-y-4">
                                <div className="bg-red-500 w-24 h-24 rounded-[2.5rem] flex items-center justify-center mx-auto shadow-2xl text-white mb-8"><i data-lucide="cross" className="w-12 h-12"></i></div>
                                <h1 className="text-6xl font-black text-slate-900 tracking-tighter uppercase italic leading-none">HACO <span className="text-red-500">OPS</span></h1>
                                <p className="text-slate-400 font-bold uppercase text-[10px] tracking-[0.4em] italic">Gestão de Equipamentos de Saúde</p>
                            </div>
                            <div className="grid grid-cols-2 gap-6">
                                {AMBULANCE_TYPES.map(t => (
                                    <button key={t.id} onClick={() => { setSelectedType(t); setMode('user'); }} className="bg-white p-8 rounded-[3.5rem] shadow-sm flex flex-col items-center gap-6 active:scale-95 transition-all border-4 border-transparent hover:border-red-500 group">
                                        <div className={`${t.color} p-6 rounded-3xl text-white shadow-xl shadow-slate-200 group-hover:scale-110 transition-transform`}><i data-lucide="truck"></i></div>
                                        <span className="font-black text-slate-800 uppercase text-[11px] tracking-widest">{t.label}</span>
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => setMode('login')} className="w-full py-8 text-slate-400 font-black text-[11px] uppercase tracking-widest hover:text-red-500 transition-colors italic border-t border-slate-200 pt-10">Painel de Auditoria Gestor</button>
                        </div>
                    </div>
                );
            }

            // --- VIEW: CHECKLIST ---
            return (
                <div className="min-h-screen pb-44 animate-fade-in bg-white">
                    <header className={`sticky top-0 z-50 ${selectedType?.color || 'bg-red-600'} text-white p-8 shadow-2xl flex justify-between items-center rounded-b-[4rem]`}>
                        <div className="flex items-center gap-6">
                            <button onClick={resetApp} className="bg-white/20 p-3 rounded-2xl border border-white/10"><i data-lucide="chevron-left"></i></button>
                            <div>
                                <h1 className="font-black text-2xl italic tracking-tighter leading-none uppercase">{selectedType?.label}</h1>
                                <p className="text-[10px] font-black uppercase opacity-70 tracking-widest italic mt-1">Hospital de Aeronáutica</p>
                            </div>
                        </div>
                        <div className="bg-black/20 px-5 py-2.5 rounded-2xl border border-white/10 text-xs font-black italic">{currentStep + 1} / {CATEGORIES.length}</div>
                    </header>

                    <nav className="flex overflow-x-auto no-scrollbar sticky top-[110px] z-40 px-6 py-5 bg-white border-b border-slate-50">
                        {CATEGORIES.map((cat, idx) => (
                            <button key={cat.id} className={`flex-1 min-w-[110px] py-4 flex flex-col items-center gap-1 border-b-4 transition-all ${idx === currentStep ? 'border-red-600 text-red-600' : 'border-transparent text-slate-300'}`}>
                                <i data-lucide={cat.icon} className="w-4 h-4"></i>
                                <span className="text-[10px] font-black uppercase tracking-tighter">{cat.label}</span>
                            </button>
                        ))}
                    </nav>

                    <main className="max-w-md mx-auto p-6 pt-12 space-y-8">
                        {CATEGORIES[currentStep].id === 'info' && (
                            <div className="bg-slate-50 p-12 rounded-[4rem] space-y-10 shadow-inner border border-slate-100">
                                <div className="text-center">
                                    <h2 className="text-3xl font-black text-slate-900 uppercase tracking-tighter italic">Identificação</h2>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mt-2 italic">Procedimento Militar SAE</p>
                                </div>
                                <div className="space-y-6">
                                    <input type="text" placeholder="VIATURA / PLACA" className="w-full p-8 rounded-[2.5rem] bg-white border-2 border-transparent focus:border-red-500 outline-none font-black text-4xl text-center uppercase shadow-sm transition-all" value={formData.placa} onChange={e => setFormData({...formData, placa: e.target.value.toUpperCase()})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="text" placeholder="POSTO (Ex: 1T)" className="w-full p-6 rounded-[2rem] bg-white border-2 border-transparent focus:border-red-500 outline-none font-bold text-center uppercase text-sm shadow-sm" value={formData.posto} onChange={e => setFormData({...formData, posto: e.target.value.toUpperCase()})} />
                                        <input type="text" placeholder="NOME DE GUERRA" className="w-full p-6 rounded-[2rem] bg-white border-2 border-transparent focus:border-red-500 outline-none font-bold text-center uppercase text-sm shadow-sm" value={formData.nomeGuerra} onChange={e => setFormData({...formData, nomeGuerra: e.target.value.toUpperCase()})} />
                                    </div>
                                </div>
                            </div>
                        )}

                        {MASTER_CHECKLIST.filter(i => i.types.includes(selectedType?.id) && i.cat === CATEGORIES[currentStep].id).map(item => (
                            <div key={item.id} className="bg-white p-8 rounded-[3.5rem] shadow-sm border border-slate-100 animate-fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <span className="font-black text-slate-800 text-lg uppercase italic leading-tight pr-4">{item.label}</span>
                                    <div className="flex bg-slate-50 p-2 rounded-2xl shadow-inner border border-slate-100">
                                        <button onClick={() => setFormData({...formData, items: {...formData.items, [item.id]: {status: 'C', obs: ''}}})} className={`px-8 py-4 rounded-xl text-xs font-black transition-all ${formData.items[item.id]?.status === 'C' ? 'bg-emerald-500 text-white shadow-xl scale-110' : 'text-slate-300'}`}>C</button>
                                        <button onClick={() => setFormData({...formData, items: {...formData.items, [item.id]: {status: 'NC', obs: ''}}})} className={`px-8 py-4 rounded-xl text-xs font-black transition-all ${formData.items[item.id]?.status === 'NC' ? 'bg-red-500 text-white shadow-xl scale-110' : 'text-slate-300'}`}>NC</button>
                                    </div>
                                </div>
                                <input type="text" placeholder="Observação técnica..." className={`w-full p-6 text-xs rounded-3xl bg-slate-50 border-none outline-none focus:ring-4 focus:ring-red-100 transition-all ${formData.items[item.id]?.status === 'NC' ? 'bg-red-50 text-red-500 font-bold italic' : ''}`} value={formData.items[item.id]?.obs || ''} onChange={e => setFormData({...formData, items: {...formData.items, [item.id]: {...formData.items[item.id], obs: e.target.value}}})} />
                            </div>
                        ))}

                        {CATEGORIES[currentStep].id === 'revisar' && (
                            <div className="bg-red-500 text-white p-12 rounded-[5rem] text-center shadow-2xl shadow-red-200 space-y-10 animate-fade-in">
                                <div className="bg-white/20 w-24 h-24 rounded-full flex items-center justify-center mx-auto"><i data-lucide="send" className="w-12 h-12"></i></div>
                                <h2 className="text-4xl font-black italic uppercase leading-none tracking-tighter">Finalizar<br/>Auditoria</h2>
                                <button onClick={handleSubmit} disabled={loading} className="w-full bg-slate-900 text-white font-black py-9 rounded-[3rem] shadow-2xl uppercase tracking-[0.3em] text-[12px] active:scale-95 transition-all italic">
                                    {loading ? 'SINCRONIZANDO...' : 'EXECUTAR TRANSMISSÃO'}
                                </button>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 p-10 bg-white/90 backdrop-blur-3xl border-t border-slate-100 flex gap-6 z-50 rounded-t-[5rem] shadow-2xl">
                        <div className="max-w-md mx-auto w-full flex gap-6">
                            {currentStep > 0 && <button onClick={() => setCurrentStep(s => s - 1)} className="flex-1 bg-white border-4 border-slate-100 text-slate-400 font-black py-7 rounded-[2.5rem] uppercase text-[11px] tracking-widest italic">Anterior</button>}
                            {currentStep < CATEGORIES.length - 1 && <button onClick={() => setCurrentStep(s => s + 1)} className="flex-[2] bg-slate-900 text-white font-black py-7 rounded-[2.5rem] shadow-2xl uppercase text-[11px] tracking-widest italic active:scale-95">Próximo Passo</button>}
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
