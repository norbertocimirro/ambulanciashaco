<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HACO - Comando de Prontidão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(14px); }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- CONFIGURAÇÃO DE BACKEND ---
        // COLE AQUI A SUA URL DO GOOGLE APPS SCRIPT
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzaxizVCggOIIjdUVyEz7Yk-8YemrsG5HZ9thMdl_DDzok2T120mggXfkZYj5S4PoAT/exec"; 

        const AMBULANCE_TYPES = [
            { id: 'basica', label: 'Básica', icon: 'truck', color: 'bg-blue-600' },
            { id: 'avancada', label: 'Avançada', icon: 'zap', color: 'bg-red-600' },
            { id: 'paje', label: 'PAJÉ', icon: 'shield', color: 'bg-green-700' },
            { id: 'missoes', label: 'Missões', icon: 'plane', color: 'bg-slate-900' }
        ];

        const CATEGORIES = [
            { id: 'info', label: 'Início', icon: 'user' },
            { id: 'Insumos', label: 'Insumos', icon: 'package' },
            { id: 'Equipamentos', label: 'Equipamentos', icon: 'stethoscope' },
            { id: 'revisar', label: 'Finalizar', icon: 'check-circle' }
        ];

        const MASTER_CHECKLIST = [
            { id: 'esparadrapo', label: 'Esparadrapo', cat: 'Insumos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'micropore', label: 'Micropore', cat: 'Insumos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'cateter', label: 'Cateter (Vários)', cat: 'Insumos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'dea', label: 'DEA / Monitor', cat: 'Equipamentos', types: ['avancada', 'missoes'] },
            { id: 'ventilador', label: 'Ventilador Mecânico', cat: 'Equipamentos', types: ['avancada', 'missoes'] },
            { id: 'oximetro', label: 'Oxímetro de Pulso', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje'] },
            { id: 'talas', label: 'Talas imobilização', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'fluxometro', label: 'Fluxômetro O2', cat: 'Equipamentos', types: ['basica', 'avancada', 'paje', 'missoes'] },
            { id: 'radio_vhf', label: 'Rádio Tático VHF', cat: 'Equipamentos', types: ['paje', 'missoes'] },
            { id: 'manta_termica', label: 'Manta Térmica', cat: 'Insumos', types: ['paje', 'missoes'] },
        ];

        function App() {
            // Estados de Interface
            const [mode, setMode] = useState('selection'); 
            const [selectedType, setSelectedType] = useState(null);
            const [currentStep, setCurrentStep] = useState(0);
            const [loading, setLoading] = useState(false);
            const [submitted, setSubmitted] = useState(false);
            
            // Estados de Dados
            const [formData, setFormData] = useState({ placa: '', responsavel: '', items: {} });
            const [adminData, setAdminData] = useState([]);
            const [loginData, setLoginData] = useState({ user: '', pass: '' });
            const prevNCSize = useRef(0); // Para detectar novos alertas NC e tocar som

            // Efeito para ícones e detecção de áudio
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [mode, currentStep, submitted, adminData]);

            // --- LÓGICA DE AUDITORIA E TURNOS ---
            const audit = useMemo(() => {
                if (!adminData || adminData.length === 0) return { operacional: 0, alerts: [], total: 0, shifts: {} };

                const now = new Date();
                const today = now.toLocaleDateString('pt-BR');
                const hour = now.getHours();

                // Identificar Turno Atual
                let currentShiftName = 'Noite';
                if (hour >= 7 && hour < 13) currentShiftName = 'Manhã';
                else if (hour >= 13 && hour < 19) currentShiftName = 'Tarde';

                // Filtrar NCs (Não Conformidades)
                const ncAlerts = adminData.filter(d => d[5] === 'NC').map(d => ({
                    timestamp: d[0], tipo: d[1], placa: d[2], resp: d[3], item: d[4], obs: d[6]
                })).reverse();

                // Disparo de Alerta Sonoro se houver NOVO NC
                if (ncAlerts.length > prevNCSize.current && mode === 'admin') {
                    const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
                    audio.play().catch(e => console.log("Interação do usuário necessária para som"));
                    prevNCSize.current = ncAlerts.length;
                }

                // Cobertura por Turno (Diário)
                const shiftCoverage = {};
                AMBULANCE_TYPES.forEach(type => {
                    const logsToday = adminData.filter(d => d[1] === type.label && d[0].includes(today));
                    const hoursFound = logsToday.map(d => parseInt(d[0].split(' ')[1].split(':')[0]));
                    
                    shiftCoverage[type.label] = {
                        Manhã: hoursFound.some(h => h >= 7 && h < 13),
                        Tarde: hoursFound.some(h => h >= 13 && h < 19),
                        Noite: hoursFound.some(h => h >= 19 || h < 7)
                    };
                });

                const totalLogs = adminData.length;
                const conforme = adminData.filter(d => d[5] === 'C').length;

                return {
                    operacional: Math.round((conforme / totalLogs) * 100) || 0,
                    alerts: ncAlerts.slice(0, 15),
                    total: totalLogs,
                    shifts: shiftCoverage,
                    currentShift: currentShiftName
                };
            }, [adminData, mode]);

            // --- FUNÇÕES DE COMANDO ---

            const resetToSelection = () => {
                setSubmitted(false);
                setLoading(false);
                setSelectedType(null);
                setCurrentStep(0);
                setFormData({ placa: '', responsavel: '', items: {} });
                setMode('selection');
            };

            const fetchAdminData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${GOOGLE_SHEET_URL}?action=read`);
                    const data = await res.json();
                    setAdminData(data);
                    prevNCSize.current = data.filter(d => d[5] === 'NC').length;
                    setMode('admin');
                } catch (e) { alert("Falha na sincronização com o HACO."); }
                setLoading(false);
            };

            const handleTypeSelect = (type) => {
                setSelectedType(type);
                const items = {};
                MASTER_CHECKLIST.filter(i => i.types.includes(type.id)).forEach(i => {
                    items[i.id] = { status: 'C', obs: '' };
                });
                setFormData({ placa: '', responsavel: '', items });
                setMode('user');
            };

            const handleSubmit = async () => {
                if (!formData.placa || !formData.responsavel) return alert("Preencha a Placa e o Responsável.");
                setLoading(true);
                const payload = {
                    action: 'write',
                    tipo: selectedType.label,
                    placa: formData.placa,
                    responsavel: formData.responsavel,
                    items: Object.entries(formData.items).map(([id, val]) => ({
                        nome: MASTER_CHECKLIST.find(i => i.id === id).label,
                        status: val.status,
                        obs: val.obs
                    }))
                };
                try {
                    await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setSubmitted(true);
                } catch (e) { alert("Erro ao salvar na planilha."); }
                setLoading(false);
            };

            // --- TELAS (VIEWS) ---

            if (submitted) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-8 text-center bg-white animate-fade-in">
                        <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mb-8 text-green-600 shadow-inner">
                            <i data-lucide="shield-check" className="w-12 h-12"></i>
                        </div>
                        <h1 className="text-3xl font-black mb-2 uppercase italic tracking-tighter">Missão Cumprida</h1>
                        <p className="text-slate-400 mb-10 font-bold text-xs uppercase tracking-widest leading-loose text-balance">Verificação salva com sucesso no banco de dados da Auditoria.</p>
                        <button onClick={resetToSelection} className="w-full max-w-xs bg-slate-900 text-white font-black py-6 rounded-[2rem] shadow-2xl uppercase tracking-[0.2em] text-[10px] active:scale-95 transition-all">Nova Verificação</button>
                    </div>
                );
            }

            if (mode === 'admin') {
                return (
                    <div className="min-h-screen bg-slate-100 flex flex-col lg:flex-row animate-fade-in">
                        {/* Sidebar */}
                        <aside className="lg:w-64 bg-slate-950 text-white p-6 flex flex-col justify-between shadow-2xl">
                            <div className="space-y-10">
                                <div className="flex items-center gap-3 border-b border-white/5 pb-8">
                                    <div className="bg-red-600 p-2.5 rounded-2xl shadow-lg shadow-red-900/40"><i data-lucide="activity" className="w-5 h-5"></i></div>
                                    <div>
                                        <h2 className="font-black text-[11px] uppercase text-red-500 italic leading-none">Gestão Tática</h2>
                                        <p className="text-[13px] font-black uppercase tracking-widest mt-1">HACO OPS</p>
                                    </div>
                                </div>
                                <nav className="space-y-1">
                                    <button className="w-full flex items-center gap-4 p-4 bg-white/5 text-white rounded-2xl font-bold text-xs border border-white/10"><i data-lucide="layout-dashboard" className="w-4 h-4"></i> DASHBOARD</button>
                                    <button onClick={fetchAdminData} className="w-full flex items-center gap-4 p-4 text-slate-500 hover:text-white rounded-2xl font-bold text-xs transition-all"><i data-lucide="refresh-cw" className={loading ? 'animate-spin' : ''}></i> SINCRONIZAR</button>
                                </nav>
                            </div>
                            <button onClick={resetToSelection} className="w-full p-5 bg-white/5 rounded-3xl text-[10px] font-black uppercase text-slate-500 hover:text-white transition-all">Sair do Comando</button>
                        </aside>

                        {/* Main Dash */}
                        <main className="flex-1 p-4 lg:p-10 space-y-8 overflow-y-auto">
                            <header className="flex flex-col md:flex-row justify-between items-end border-b pb-8 gap-4">
                                <div>
                                    <h1 className="text-5xl font-black text-slate-900 tracking-tighter uppercase italic leading-none">Sala de Situação</h1>
                                    <p className="text-slate-400 font-bold text-[10px] uppercase tracking-[0.4em] mt-3">Turno Operacional: <span className="text-red-600 underline underline-offset-4 font-black">{audit.currentShift}</span></p>
                                </div>
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200 text-center min-w-[150px]">
                                    <span className="block text-[9px] font-black text-slate-400 uppercase mb-2 tracking-widest">Operacionalidade</span>
                                    <span className={`text-3xl font-black leading-none ${audit.operacional > 90 ? 'text-green-600' : 'text-red-600'}`}>{audit.operacional}%</span>
                                </div>
                            </header>

                            {/* Monitor de Turnos */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
                                {AMBULANCE_TYPES.map(t => (
                                    <div key={t.id} className="bg-white p-7 rounded-[2.5rem] shadow-sm border-b-4 border-slate-200">
                                        <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6 border-b pb-2">{t.label}</h4>
                                        <div className="space-y-4">
                                            {['Manhã', 'Tarde', 'Noite'].map(s => (
                                                <div key={s} className="flex justify-between items-center">
                                                    <span className="text-[10px] font-black text-slate-400 uppercase italic">{s}</span>
                                                    <div className={`px-3 py-1 rounded-full text-[9px] font-black uppercase ${audit.shifts[t.label][s] ? 'bg-green-100 text-green-600' : 'bg-red-50 text-red-500 animate-pulse'}`}>
                                                        {audit.shifts[t.label][s] ? 'Concluído' : 'Pendente'}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Alertas Críticos */}
                            <div className="bg-slate-950 text-white rounded-[3.5rem] p-10 shadow-2xl relative overflow-hidden">
                                <h3 className="text-xs font-black uppercase tracking-[0.3em] mb-8 flex items-center gap-3 text-red-500 italic">
                                    <i data-lucide="zap" className="w-5 h-5 animate-bounce"></i> Falhas de Prontidão Detectadas
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {audit.alerts.length > 0 ? audit.alerts.map((a, i) => (
                                        <div key={i} className="flex items-center justify-between p-5 bg-white/5 rounded-3xl border border-white/10 hover:border-red-600/50 transition-all group">
                                            <div className="flex items-center gap-5">
                                                <div className="bg-red-600/20 text-red-500 p-3 rounded-2xl group-hover:bg-red-600 group-hover:text-white transition-all"><i data-lucide="x-circle" className="w-5 h-5"></i></div>
                                                <div>
                                                    <p className="text-[13px] font-black uppercase italic tracking-tighter leading-none">{a.item}</p>
                                                    <p className="text-[10px] font-bold text-red-500 uppercase mt-2">{a.obs || "Material Faltante"}</p>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <span className="block text-[10px] font-black uppercase text-slate-600 leading-none">{a.placa}</span>
                                                <span className="text-[9px] font-bold text-slate-800 uppercase mt-1 italic opacity-40">{a.timestamp.split(' ')[1]}</span>
                                            </div>
                                        </div>
                                    )) : <div className="col-span-2 text-center py-16 opacity-10 font-black text-xl uppercase tracking-[0.5em] italic italic">Auditoria Limpa</div>}
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            if (mode === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 animate-fade-in">
                        <div className="w-full max-w-sm bg-white p-12 rounded-[4rem] shadow-2xl space-y-10">
                            <div className="text-center">
                                <div className="bg-red-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl text-white shadow-red-900/20"><i data-lucide="lock" className="w-8 h-8"></i></div>
                                <h2 className="text-3xl font-black uppercase tracking-tighter text-slate-900 italic">Painel Gestor</h2>
                            </div>
                            <div className="space-y-4">
                                <input type="text" placeholder="USUÁRIO" className="w-full p-6 bg-slate-100 rounded-[2rem] outline-none font-black text-center uppercase text-sm border-2 border-transparent focus:border-red-500 transition-all shadow-inner" value={loginData.user} onChange={e => setLoginData({...loginData, user: e.target.value})} />
                                <input type="password" placeholder="SENHA" className="w-full p-6 bg-slate-100 rounded-[2rem] outline-none font-black text-center text-sm border-2 border-transparent focus:border-red-500 transition-all shadow-inner" value={loginData.pass} onChange={e => setLoginData({...loginData, pass: e.target.value})} />
                            </div>
                            <button onClick={() => { if(loginData.user === 'admin' && loginData.pass === 'sdenf2026') fetchAdminData(); else alert("Acesso Negado."); }} className="w-full bg-slate-900 text-white font-black py-7 rounded-[2rem] shadow-2xl uppercase tracking-widest text-[11px] active:scale-95 transition-all">Acessar Comando</button>
                            <button onClick={resetToSelection} className="w-full text-slate-400 text-[10px] font-black uppercase tracking-[0.3em] hover:text-red-500 transition-colors italic">Voltar ao Checklist</button>
                        </div>
                    </div>
                );
            }

            if (mode === 'selection') {
                return (
                    <div className="min-h-screen p-6 flex flex-col justify-center animate-fade-in bg-slate-100">
                        <div className="max-w-md mx-auto w-full space-y-12 text-center">
                            <div className="space-y-4">
                                <div className="bg-red-600 w-24 h-24 rounded-[2rem] flex items-center justify-center mx-auto shadow-2xl mb-6 text-white shadow-red-900/10"><i data-lucide="cross" className="w-12 h-12"></i></div>
                                <h1 className="text-5xl font-black tracking-tighter text-slate-900 italic uppercase leading-none">Sistema HACO</h1>
                                <p className="text-slate-400 font-bold uppercase text-[10px] tracking-[0.4em] italic">Gestão de Prontidão e SAE</p>
                            </div>
                            <div className="grid grid-cols-2 gap-6">
                                {AMBULANCE_TYPES.map(type => (
                                    <button key={type.id} onClick={() => handleTypeSelect(type)} className="bg-white p-8 rounded-[3.5rem] card-shadow flex flex-col items-center gap-6 active:scale-95 transition-all border-4 border-transparent hover:border-red-600 group">
                                        <div className={`${type.color} p-6 rounded-3xl text-white shadow-xl group-hover:scale-110 transition-transform`}><i data-lucide={type.icon} className="w-8 h-8"></i></div>
                                        <span className="font-black text-slate-800 uppercase text-[11px] tracking-widest">{type.label}</span>
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => setMode('login')} className="w-full py-6 text-slate-400 font-black text-[10px] uppercase tracking-widest hover:text-red-600 transition-colors italic">Acesso Administrativo</button>
                        </div>
                    </div>
                );
            }

            // --- VIEW: FORMULÁRIO ---
            const items = MASTER_CHECKLIST.filter(i => i.types.includes(selectedType?.id) && i.cat === CATEGORIES[currentStep].id);

            return (
                <div className="min-h-screen pb-40 animate-fade-in bg-white">
                    <header className={`sticky top-0 z-50 ${selectedType?.color || 'bg-red-600'} text-white p-7 shadow-xl flex justify-between items-center rounded-b-[3rem]`}>
                        <div className="flex items-center gap-5">
                            <button onClick={resetToSelection} className="bg-white/20 p-3 rounded-2xl"><i data-lucide="chevron-left" className="w-6 h-6"></i></button>
                            <div>
                                <h1 className="font-black text-2xl italic tracking-tighter leading-none uppercase">{selectedType?.label}</h1>
                                <p className="text-[10px] font-black uppercase opacity-60 tracking-widest mt-1">Hospital de Aeronáutica</p>
                            </div>
                        </div>
                        <div className="bg-black/20 px-5 py-2.5 rounded-2xl border border-white/10 text-xs font-black italic">{currentStep + 1} / {CATEGORIES.length}</div>
                    </header>

                    <nav className="bg-white/80 backdrop-blur-lg flex overflow-x-auto no-scrollbar sticky top-[100px] z-40 px-5 py-3 border-b border-slate-50">
                        {CATEGORIES.map((cat, idx) => (
                            <button key={cat.id} className={`flex-1 min-w-[100px] py-4 flex flex-col items-center gap-1 border-b-4 transition-all ${idx === currentStep ? 'border-red-600 text-red-600 bg-red-50/50 rounded-t-3xl' : 'border-transparent text-slate-300'}`}>
                                <i data-lucide={cat.icon} className="w-4 h-4"></i>
                                <span className="text-[9px] font-black uppercase tracking-tighter">{cat.label}</span>
                            </button>
                        ))}
                    </nav>

                    <main className="max-w-md mx-auto p-6 space-y-6 pt-10">
                        {CATEGORIES[currentStep].id === 'info' && (
                            <div className="bg-slate-50 p-12 rounded-[4rem] border border-slate-200 space-y-10 shadow-inner">
                                <div className="text-center">
                                    <h2 className="text-3xl font-black text-slate-900 uppercase tracking-tighter italic">Identificação</h2>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mt-2 italic">Controle Prontidão SAE</p>
                                </div>
                                <div className="space-y-6">
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-6 italic">Viatura / Placa</label>
                                        <input type="text" placeholder="EX: FAB-1234" className="w-full p-7 rounded-[2.5rem] bg-white border-2 border-transparent focus:border-red-500 outline-none font-black text-3xl text-center uppercase shadow-sm transition-all" value={formData.placa} onChange={e => setFormData({...formData, placa: e.target.value.toUpperCase()})} />
                                    </div>
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-6 italic">Enfermeiro de Serviço</label>
                                        <input type="text" placeholder="SEU NOME" className="w-full p-7 rounded-[2.5rem] bg-white border-2 border-transparent focus:border-red-500 outline-none font-bold text-center uppercase shadow-sm transition-all text-sm" value={formData.responsavel} onChange={e => setFormData({...formData, responsavel: e.target.value.toUpperCase()})} />
                                    </div>
                                </div>
                            </div>
                        )}

                        {items.map(item => (
                            <div key={item.id} className="bg-white p-8 rounded-[3.5rem] card-shadow border border-slate-100 animate-fade-in relative overflow-hidden group">
                                <div className="flex justify-between items-center mb-8">
                                    <span className="font-black text-slate-800 tracking-tighter text-lg uppercase italic leading-tight">{item.label}</span>
                                    <div className="flex bg-slate-100 p-1.5 rounded-2xl shrink-0 shadow-inner">
                                        <button onClick={() => setFormData({...formData, items: {...formData.items, [item.id]: {...formData.items[item.id], status: 'C'}}})} className={`px-7 py-4 rounded-xl text-xs font-black transition-all ${formData.items[item.id].status === 'C' ? 'bg-green-500 text-white shadow-xl scale-110' : 'text-slate-400'}`}>C</button>
                                        <button onClick={() => setFormData({...formData, items: {...formData.items, [item.id]: {...formData.items[item.id], status: 'NC'}}})} className={`px-7 py-4 rounded-xl text-xs font-black transition-all ${formData.items[item.id].status === 'NC' ? 'bg-red-500 text-white shadow-xl scale-110' : 'text-slate-400'}`}>NC</button>
                                    </div>
                                </div>
                                <input type="text" placeholder="Descrever observação..." className={`w-full p-5 text-xs rounded-3xl bg-slate-50 border-none outline-none focus:ring-4 focus:ring-red-50 transition-all ${formData.items[item.id].status === 'NC' ? 'bg-red-50 text-red-600 font-bold placeholder:text-red-200' : 'text-slate-600'}`} value={formData.items[item.id].obs} onChange={e => setFormData({...formData, items: {...formData.items, [item.id]: {...formData.items[item.id], obs: e.target.value}}})} />
                            </div>
                        ))}

                        {CATEGORIES[currentStep].id === 'revisar' && (
                            <div className="bg-slate-950 text-white p-12 rounded-[4.5rem] space-y-10 text-center shadow-[0_30px_60px_-15px_rgba(0,0,0,0.3)] border-t-4 border-red-600">
                                <div className="bg-white/5 w-24 h-24 rounded-full flex items-center justify-center mx-auto text-red-500 shadow-inner"><i data-lucide="send" className="w-12 h-12"></i></div>
                                <div className="space-y-4">
                                    <h2 className="text-4xl font-black italic uppercase tracking-tighter leading-none">Confirmar<br/>Gravação</h2>
                                    <div className="bg-white/5 p-8 rounded-[3rem] border border-white/10 space-y-4">
                                        <p className="text-[11px] font-black uppercase text-slate-500 tracking-[0.4em] italic">Resumo do Turno</p>
                                        <p className="font-black text-2xl tracking-tighter uppercase italic text-red-500 underline underline-offset-8">{formData.placa}</p>
                                        <div className="pt-4">
                                            <span className={`px-6 py-2 rounded-full text-[11px] font-black uppercase ${Object.values(formData.items).some(v => v.status === 'NC') ? 'bg-red-600 text-white' : 'bg-green-600 text-white'}`}>
                                                {Object.values(formData.items).filter(v => v.status === 'NC').length} Alertas de NC
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={handleSubmit} disabled={loading} className="w-full bg-red-600 hover:bg-red-700 text-white font-black py-8 rounded-[2.5rem] shadow-2xl shadow-red-950/50 uppercase tracking-[0.3em] text-[11px] active:scale-95 transition-all">
                                    {loading ? 'SINCRONIZANDO...' : 'FINALIZAR E GRAVAR'}
                                </button>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 p-8 glass border-t border-slate-100 flex gap-5 z-50 rounded-t-[4rem] shadow-2xl">
                        <div className="max-w-md mx-auto w-full flex gap-5">
                            {currentStep > 0 && <button onClick={() => setCurrentStep(s => s - 1)} className="flex-1 bg-white border-4 border-slate-100 text-slate-500 font-black py-6 rounded-[2.5rem] uppercase text-[10px] tracking-widest active:bg-slate-50 transition-all italic">Anterior</button>}
                            {currentStep < CATEGORIES.length - 1 && <button onClick={() => setCurrentStep(s => s + 1)} className="flex-[2] bg-slate-950 text-white font-black py-6 rounded-[2.5rem] shadow-2xl uppercase text-[10px] tracking-widest active:scale-95 transition-all italic">Próximo</button>}
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
